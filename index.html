<script>
// ─────────────────────────────────────────────────────
//  CONFIG & ADATBÁZIS
// ─────────────────────────────────────────────────────
const R       = 340;   
const ROAD_W  = 240;   
const GOLD_TIME = 300000; // 5 perc arany idő (millisecond)

const CAR_L   = 60;    
const CAR_W   = 12;    
const CAR_FRONT_TRACK = 46; 
const CAR_REAR_TRACK  = 46; 
const CAR_FRONT_AXLE = CAR_L * 0.68; 
const CAR_REAR_AXLE  = CAR_L * 0.32;

const MAX_ROAD = 500;  
const MAX_HEX  = 140;  
const ACCEL    = 220;  
const BRAKE    = 800;  
const COAST    = 100;  
const STEER    = 2.4;  

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
function rsz(){ cv.width=innerWidth; cv.height=innerHeight; }
rsz(); window.addEventListener('resize', rsz);

// Pálya struktúrák kódolása: [belépő_él, kilépő_él, Típus_jelző]
// Típusok: 'S'=Start, 'F'=Finish, 'O'=Overpass(Híd), 'N'=Narrow(Szűkített)
const LEVEL_DATA = [
  // Lvl 1: Bemelegítés
  [[4,0,'S'], [3,5], [2,4], [1,3], [0,2], [5,1,'F']],
  // Lvl 2: Klasszikus Nyolcas (Híddal)
  [[4,0,'S'], [3,1], [4,2], [5,3], [0,4], [1,0], [3,5], [2,5,'O'], [2,4], [1,3], [0,2], [5,1,'F']],
  // Lvl 3: Az első szűkületek
  [[4,1,'S'], [4,1,'N'], [4,2], [5,3,'N'], [0,4], [1,5], [2,0,'N'], [3,1,'F']],
  // Lvl 4: Hosszú egyenesek
  [[4,1,'S'], [4,1], [4,1], [4,2], [5,2], [5,2], [5,3], [0,3], [0,3], [0,4], [1,4], [1,4], [1,5], [2,5], [2,5], [2,0,'F']],
  // Lvl 5: Technikás kanyarok
  [[4,0,'S'], [3,5], [2,3], [0,5], [2,4], [1,0], [3,2], [5,4], [1,3], [0,2], [5,1,'F']],
  // Lvl 6: Híd és Szűkület kombó
  [[4,1,'S'], [4,2], [5,0], [3,1,'N'], [4,2], [5,3], [0,4], [1,5], [2,5,'O'], [2,0], [3,1,'N'], [4,2,'F']],
  // Lvl 7: Cikcakk
  [[4,0,'S'], [3,1], [4,0], [3,1], [4,0], [3,1], [4,2], [5,3], [0,4], [1,5], [2,0], [3,4], [1,5], [2,0], [3,1,'F']],
  // Lvl 8: Precíziós vezetés
  [[4,1,'S'], [4,1,'N'], [4,1], [4,2], [5,2,'N'], [5,2], [5,3], [0,3,'N'], [0,3], [0,4], [1,4,'N'], [1,4], [1,5], [2,5,'N'], [2,5], [2,0,'F']],
  // Lvl 9: Dupla Híd
  [[4,0,'S'], [3,1], [4,2], [5,3], [0,4], [1,0], [3,5], [2,5,'O'], [2,4], [1,3], [0,4], [1,0], [3,5], [2,5,'O'], [2,4], [1,3], [0,2], [5,1,'F']],
  // Lvl 10: A Maraton (Végső teszt)
  [[4,1,'S'], [4,2], [5,3,'N'], [0,4], [1,0], [3,5], [2,5,'O'], [2,3], [0,4], [1,5,'N'], [2,0], [3,4], [1,2], [5,0,'N'], [3,5], [2,5,'O'], [2,4], [1,3], [0,2,'N'], [5,0], [3,1,'F']]
];

// Mentések betöltése
let savedRecords = Array(LEVEL_DATA.length).fill(null);
try {
    const stored = localStorage.getItem('hexRacerRecords');
    if (stored) savedRecords = JSON.parse(stored);
} catch(e) { console.warn("Local storage nem elérhető"); }

function saveRecords() {
    try { localStorage.setItem('hexRacerRecords', JSON.stringify(savedRecords)); } catch(e) {}
}

let SEQ = [];
let currentLevelIdx = 0;
let totalCPs = 0;

// ─────────────────────────────────────────────────────
//  MENÜ & PROGRESSZIÓ
// ─────────────────────────────────────────────────────
function fmt(ms){
  if (ms === null || ms === undefined) return '--:--.---';
  const m=Math.floor(ms/60000);
  const s=Math.floor((ms%60000)/1000);
  const c=String(Math.floor(ms%1000)).padStart(3,'0');
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${c}`;
}

function initMenu() {
    state = 'menu';
    document.getElementById('finishMenu').style.display = 'none';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('hud2').style.display = 'none';
    document.getElementById('ctrl').style.display = 'none';
    document.getElementById('btnBox').style.display = 'none';
    
    const grid = document.getElementById('lvlGrid');
    grid.innerHTML = '';
    let unlocked = true;
    
    for (let i = 0; i < LEVEL_DATA.length; i++) {
        const best = savedRecords[i];
        const btn = document.createElement('div');
        btn.className = 'lvlBtn' + (unlocked ? '' : ' locked');
        
        let statusHTML = unlocked 
            ? `<div class="lt">LEGJOBB: <span style="color:#fff">${fmt(best)}</span></div>` 
            : `<div class="lt" style="color:#777;">FELOLDÁSHOZ ARANY KELL</div>`;
            
        btn.innerHTML = `<div class="ln">PÁLYA ${i+1}</div>${statusHTML}`;
        
        if (unlocked) {
            btn.onclick = () => loadLevel(i);
        }
        grid.appendChild(btn);
        
        // Következő pálya csak akkor nyílik, ha van idő és az <= GOLD_TIME
        if (best === null || best > GOLD_TIME) {
            unlocked = false; 
        }
    }
    
    document.getElementById('lvlSel').style.display = 'flex';
}

function loadLevel(idx) {
    currentLevelIdx = idx;
    // Pálya betöltése a kompakt adatbázisból
    SEQ = LEVEL_DATA[idx].map(t => ({
        entry: t[0], exit: t[1],
        isStart: t[2] === 'S',
        isFinish: t[2] === 'F',
        isOverpass: t[2] === 'O',
        isNarrow: t[2] === 'N'
    }));
    
    document.getElementById('lvlSel').style.display = 'none';
    document.getElementById('finishMenu').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('hud2').style.display = 'flex';
    document.getElementById('ctrl').style.display = 'flex';
    document.getElementById('btnBox').style.display = 'flex';
    
    resetGame();
    state = 'racing';
    lastTs = performance.now();
}

// ─────────────────────────────────────────────────────
//  HEX MATH
// ─────────────────────────────────────────────────────
const APOTHEM = R * Math.sqrt(3) / 2;
function edgeAngle(e) { return Math.PI/3*e + Math.PI/6; }
function edgeMid(cx, cy, e) {
  const a = edgeAngle(e);
  return { x: cx + APOTHEM*Math.cos(a), y: cy + APOTHEM*Math.sin(a) };
}
function oppEdge(e) { return (e+3)%6; }

function nextCenter(prevExitMidX, prevExitMidY, prevExit) {
  const entryA = edgeAngle(oppEdge(prevExit)); 
  return { x: prevExitMidX - APOTHEM * Math.cos(entryA), y: prevExitMidY - APOTHEM * Math.sin(entryA) };
}

function buildTrack() {
  const tiles = [];
  let cx = 0, cy = 0;
  for (let i = 0; i < SEQ.length; i++) {
    const s = SEQ[i];
    const tile = {
      idx: i, cx, cy, key: `T_${i}`,
      entry: s.entry, exit: s.exit,
      isStart: s.isStart || false,
      isFinish: s.isFinish || false,
      isCheckpoint: true, 
      isOverpass: s.isOverpass || false,
      isNarrow: s.isNarrow || false,
      visited: false
    };
    tiles.push(tile);
    const em = edgeMid(cx, cy, tile.exit);
    const nc = nextCenter(em.x, em.y, tile.exit);
    cx = nc.x; cy = nc.y;
  }
  return tiles;
}

// ─────────────────────────────────────────────────────
//  ROAD BEZIER
// ─────────────────────────────────────────────────────
function tileBezier(tile) {
  const p0 = edgeMid(tile.cx, tile.cy, tile.entry);
  const p3 = edgeMid(tile.cx, tile.cy, tile.exit);
  const cp1 = { x: tile.cx*0.5 + p0.x*0.5, y: tile.cy*0.5 + p0.y*0.5 };
  const cp2 = { x: tile.cx*0.5 + p3.x*0.5, y: tile.cy*0.5 + p3.y*0.5 };
  return { p0, cp1, cp2, p3 };
}

function bezPt(t, p0, c1, c2, p3) {
  const u = 1-t;
  return {
    x: u*u*u*p0.x + 3*u*u*t*c1.x + 3*u*t*t*c2.x + t*t*t*p3.x,
    y: u*u*u*p0.y + 3*u*u*t*c1.y + 3*u*t*t*c2.y + t*t*t*p3.y,
  };
}

function distToRoadCenter(px, py, tile) {
  const bz = tileBezier(tile);
  let best = Infinity;
  for (let i=0; i<=40; i++) {
    const pt = bezPt(i/40, bz.p0, bz.cp1, bz.cp2, bz.p3);
    const d  = Math.hypot(px-pt.x, py-pt.y);
    if (d < best) best = d;
  }
  return best;
}

function inHex(px, py, cx, cy) {
  for (let e=0; e<6; e++) {
    const a = edgeAngle(e);
    const mid = edgeMid(cx, cy, e);
    if ((px-mid.x)*Math.cos(a) + (py-mid.y)*Math.sin(a) > 3.0) return false;
  }
  return true;
}

// ─────────────────────────────────────────────────────
//  RENDERING
// ─────────────────────────────────────────────────────
const TSIZE = Math.ceil(R*2 + 10);
const tCache = new Map();

function renderTile(tile) {
  // Szűkítés beleépítve a kulcsba!
  const ck = `${tile.key}_${tile.entry}_${tile.exit}_${tile.isNarrow ? 'N' : 'W'}_${tile.isOverpass ? 'O' : 'G'}`;
  if (tCache.has(ck)) return tCache.get(ck);

  const oc = document.createElement('canvas');
  oc.width = oc.height = TSIZE;
  const c = oc.getContext('2d');
  const cx = TSIZE/2, cy = TSIZE/2;

  function hexPath(padding = 0) {
    c.beginPath();
    for (let i=0; i<6; i++) {
      const a = Math.PI/3*i;
      const rExt = R + padding;
      i===0 ? c.moveTo(cx+rExt*Math.cos(a), cy+rExt*Math.sin(a)) : c.lineTo(cx+rExt*Math.cos(a), cy+rExt*Math.sin(a));
    }
    c.closePath();
  }

  // Fű háttér
  if (!tile.isOverpass) {
    hexPath(3); c.fillStyle='#5cd639'; c.fill(); 
    c.save(); hexPath(1); c.clip();
    c.strokeStyle='#4ab32b'; c.lineWidth=3; 
    for(let x=0;x<TSIZE;x+=60){ c.beginPath();c.moveTo(x,0);c.lineTo(x,TSIZE);c.stroke(); }
    for(let y=0;y<TSIZE;y+=60){ c.beginPath();c.moveTo(0,y);c.lineTo(TSIZE,y);c.stroke(); }
    c.restore();
  }

  const bz = { p0: edgeMid(cx, cy, tile.entry), p3: edgeMid(cx, cy, tile.exit) };
  bz.cp1 = { x:cx*0.5+bz.p0.x*0.5, y:cy*0.5+bz.p0.y*0.5 };
  bz.cp2 = { x:cx*0.5+bz.p3.x*0.5, y:cy*0.5+bz.p3.y*0.5 };

  function drawRoadBez(lineW, style) {
    c.beginPath(); c.moveTo(bz.p0.x, bz.p0.y);
    c.bezierCurveTo(bz.cp1.x,bz.cp1.y, bz.cp2.x,bz.cp2.y, bz.p3.x,bz.p3.y);
    c.strokeStyle=style; c.lineWidth=lineW; c.lineCap='butt'; c.stroke();
  }

  c.save(); hexPath(1); c.clip();
  
  const w = tile.isNarrow ? ROAD_W * 0.45 : ROAD_W;
  
  if (tile.isOverpass) {
    c.shadowColor = 'rgba(0,30,60,0.8)'; c.shadowBlur = 40; c.shadowOffsetY = 25;
    drawRoadBez(w+30, '#999'); // Árnyék
    c.shadowColor = 'transparent';
    
    // Szalagkorlát a híd szélén
    drawRoadBez(w+12, '#a0a0a0'); 
    drawRoadBez(w-4, '#d0d0d0'); 
    drawRoadBez(w-10, '#ffffff'); 
  } else {
    // Ha szűk az út, földpadka látszik a hiányzó aszfalt helyén!
    if (tile.isNarrow) {
        drawRoadBez(ROAD_W, '#3a2415'); 
        drawRoadBez(ROAD_W - 4, '#4a301d');
    }
    drawRoadBez(w+16, '#222');  
  }
  
  drawRoadBez(w, '#444');     
  drawRoadBez(w*0.4, '#505050'); 

  c.setLineDash([30, 24]);
  c.beginPath(); c.moveTo(bz.p0.x, bz.p0.y);
  c.bezierCurveTo(bz.cp1.x,bz.cp1.y, bz.cp2.x,bz.cp2.y, bz.p3.x,bz.p3.y);
  c.strokeStyle='rgba(255,255,255,0.7)'; c.lineWidth=6; c.stroke();
  c.setLineDash([]);
  c.restore();

  function drawLineAcross(t, color, width) {
    const pt = bezPt(t, bz.p0, bz.cp1, bz.cp2, bz.p3);
    const ptA = bezPt(t-0.01, bz.p0, bz.cp1, bz.cp2, bz.p3);
    const ptB = bezPt(t+0.01, bz.p0, bz.cp1, bz.cp2, bz.p3);
    const angle = Math.atan2(ptB.y - ptA.y, ptB.x - ptA.x);
    const perpA = angle - Math.PI/2;
    const hw = w * 0.5; // Csak a tényleges aszfaltszélességig húzzuk
    
    c.beginPath(); 
    c.moveTo(pt.x + Math.cos(perpA)*hw, pt.y + Math.sin(perpA)*hw);
    c.lineTo(pt.x - Math.cos(perpA)*hw, pt.y - Math.sin(perpA)*hw);
    c.strokeStyle = color; 
    c.lineWidth = width; 
    c.stroke();
  }

  if (tile.isStart) drawLineAcross(0.05, '#00ff00', 12);
  if (tile.isFinish) drawLineAcross(0.95, '#ffff00', 12);

  function kerb(edgeIdx) {
    const mid   = edgeMid(cx, cy, edgeIdx);
    const outA  = edgeAngle(edgeIdx);
    const perpA = outA - Math.PI/2;
    const hw    = w*0.5; // Rázókő is szűkül
    const n     = 10;
    const sw    = (hw*2)/n;
    const depth = 24;
    for (let s=0; s<n; s++) {
      const t = -hw + sw*s + sw*0.5;
      const bx = mid.x + Math.cos(perpA)*t;
      const by = mid.y + Math.sin(perpA)*t;
      c.save(); c.translate(bx,by); c.rotate(outA);
      c.fillStyle = s%2===0 ? '#ff0033' : '#ffffff';
      c.fillRect(-sw*0.48, -depth/2, sw*0.96, depth);
      c.restore();
    }
  }
  kerb(tile.entry);
  kerb(tile.exit);

  tCache.set(ck, oc);
  return oc;
}

// ─────────────────────────────────────────────────────
//  GAME ENGINE & PHYSICS
// ─────────────────────────────────────────────────────
let tiles=[], car={}, cam={};
let state='menu', raceStart=0, raceTime=0;
let finished=false;
let isNewRecord=false;

function mkBtn(id) {
  const el = document.getElementById(id);
  const s = { v:false };
  const press = (e) => { if(e.cancelable) e.preventDefault(); e.stopPropagation(); s.v=true; el.classList.add('on'); };
  const release = (e) => { if(e.cancelable) e.preventDefault(); e.stopPropagation(); s.v=false; el.classList.remove('on'); };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
  return s;
}
const btnL = mkBtn('bL');
const btnR = mkBtn('bR');
const keys = {};
document.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',   e=>keys[e.key.toLowerCase()]=false);

function crossedFinish(px, py) {
  const ft = tiles[tiles.length-1]; 
  const mid  = edgeMid(ft.cx, ft.cy, ft.exit);
  const outA = edgeAngle(ft.exit);
  const nx = Math.cos(outA), ny = Math.sin(outA);
  const perp = -ny, pery = nx;
  const d0 = (px    -mid.x)*nx + (py    -mid.y)*ny;
  const d1 = (car.x -mid.x)*nx + (car.y -mid.y)*ny;
  const w = ft.isNarrow ? ROAD_W*0.45 : ROAD_W;
  const pd = Math.abs((car.x-mid.x)*perp + (car.y-mid.y)*pery);
  return pd < w*0.45 && d0 < 0 && d1 >= 0;
}

function resetGame() {
  tCache.clear(); // Szükséges, ha új pályát töltünk
  tiles = buildTrack();
  totalCPs = tiles.length; 
  
  const st = tiles[0];
  const em = edgeMid(st.cx, st.cy, st.exit);
  const em0= edgeMid(st.cx, st.cy, st.entry);
  
  car = { 
    x:st.cx, y:st.cy, 
    angle:Math.atan2(em.y-em0.y, em.x-em0.x), 
    speed:0, trail:[], skidMarks:[], falling:false, fallAlpha:1, 
    tIdx: 0, onHex:true, onRoad:true, steerVisual: 0,
    cpsHit: 0 
  };
  cam = { x:car.x, y:car.y, zoom:0.55 }; 
  raceStart=0; raceTime=0; finished=false; isNewRecord=false;
  updHUD(0);
}

function getWheelCoords(baseAngle, isSkidding, isHighUp) {
  const frontDist = CAR_FRONT_AXLE;
  const rearDist  = -CAR_REAR_AXLE;

  const frontX = Math.cos(baseAngle) * frontDist;
  const frontY = Math.sin(baseAngle) * frontDist;
  const rearX  = Math.cos(baseAngle) * rearDist;
  const rearY  = Math.sin(baseAngle) * rearDist;

  const dx = Math.cos(baseAngle + Math.PI/2);
  const dy = Math.sin(baseAngle + Math.PI/2);

  const wheels = {
    fl: { x: car.x + frontX + dx * CAR_FRONT_TRACK/2, y: car.y + frontY + dy * CAR_FRONT_TRACK/2, rot: baseAngle + car.steerVisual },
    fr: { x: car.x + frontX - dx * CAR_FRONT_TRACK/2, y: car.y + frontY - dy * CAR_FRONT_TRACK/2, rot: baseAngle + car.steerVisual },
    rl: { x: car.x + rearX  + dx * CAR_REAR_TRACK/2,  y: car.y + rearY  + dy * CAR_REAR_TRACK/2,  rot: baseAngle },
    rr: { x: car.x + rearX  - dx * CAR_REAR_TRACK/2,  y: car.y + rearY  - dy * CAR_REAR_TRACK/2,  rot: baseAngle }
  };

  if(car.onRoad && isSkidding) {
    const ptL = wheels.rl; 
    car.skidMarks.push({ p0: {x: ptL.x, y: ptL.y}, p1: {x: ptL.x, y: ptL.y}, wheel: 'l', high: isHighUp });
    const ptR = wheels.rr;
    car.skidMarks.push({ p0: {x: ptR.x, y: ptR.y}, p1: {x: ptR.x, y: ptR.y}, wheel: 'r', high: isHighUp });
    if(car.skidMarks.length > 500) car.skidMarks.splice(0, 2);
  }
  return wheels;
}

// Általános Híd Detektáló (Magasan vagyunk-e)
function checkHighUp(idx) {
    if (!tiles[idx]) return false;
    if (tiles[idx].isOverpass) return true;
    if (tiles[idx+1] && tiles[idx+1].isOverpass) return true; // Felfelé rámpa
    if (tiles[idx-1] && tiles[idx-1].isOverpass) return true; // Lefelé rámpa
    return false;
}

let lastTs=0;
function update(ts) {
  const dt = Math.min((ts-lastTs)/1000, 0.05);
  lastTs = ts;

  if (car.falling) {
    car.fallAlpha -= dt*1.5;
    car.speed *= 0.9;
    car.x += Math.cos(car.angle)*car.speed*dt;
    car.y += Math.sin(car.angle)*car.speed*dt;
    if (car.fallAlpha <= 0) {
      resetGame(); state='racing';
      doFlash('PÁLYA ELHAGYVA', '#ff3366');
    }
    return;
  }

  let goL = false, goR = false, gasK = false;
  if (!finished) {
    goL = btnL.v || keys['arrowleft'] || keys['a'];
    goR = btnR.v || keys['arrowright']|| keys['d'];
    gasK= keys['arrowup'] || keys['w'];
  }

  const gas   = goL || goR || gasK;
  const brake = (!finished && !goL && !goR && !gasK); 
  const steer = goL ? -1 : goR ? 1 : 0;
  const maxSpd = car.onRoad ? MAX_ROAD : MAX_HEX;
  
  if (finished) {
      car.speed -= 220 * dt; 
      car.steerVisual *= 0.85; 
  } else {
      if (gas)   car.speed += ACCEL*dt;
      if (brake) car.speed -= BRAKE*dt;
      else if (!gas) car.speed -= COAST*dt;
  }
  
  if (!car.onRoad) car.speed *= (1 - 0.8*dt); 
  car.speed = Math.max(0, Math.min(maxSpd, car.speed));

  const sr = STEER * (0.3 + 0.7*car.speed/MAX_ROAD);
  if (!finished) {
      car.angle += steer*sr*dt;
      car.steerVisual = steer * (Math.abs(sr/STEER)) * 0.5;
  }

  const px=car.x, py=car.y;
  car.x += Math.cos(car.angle)*car.speed*dt;
  car.y += Math.sin(car.angle)*car.speed*dt;

  let candidates = [];
  for (let i = 0; i < tiles.length; i++) {
    if (inHex(car.x, car.y, tiles[i].cx, tiles[i].cy)) candidates.push(i);
  }

  let newIdx = car.tIdx;
  let foundHex = false;
  let bestRoadDist = Infinity;

  if (candidates.length > 0) {
    foundHex = true;
    let isHigh = checkHighUp(car.tIdx);
    
    // Ha magasan vagyunk, ignoráljuk az alsó csempéket
    if (isHigh) {
        candidates = candidates.filter(c => checkHighUp(c));
    } else {
        candidates = candidates.filter(c => !tiles[c].isOverpass); // Ha lent vagyunk, ne váltsunk egyből hídra
    }

    if (candidates.length === 0) candidates = [car.tIdx]; // Biztonsági háló

    let minRD = Infinity;
    for (let c of candidates) {
        let rd = distToRoadCenter(car.x, car.y, tiles[c]);
        if (c === car.tIdx) rd -= 100; 
        if (c === (car.tIdx + 1) % tiles.length) rd -= 50; 
        if (rd < minRD) {
            minRD = rd;
            newIdx = c;
        }
    }
    bestRoadDist = distToRoadCenter(car.x, car.y, tiles[newIdx]);
  }

  car.tIdx = newIdx;
  car.onHex = foundHex;

  // Fizikai határok (Szűkületnél kisebb)
  const currentTile = tiles[car.tIdx];
  if (currentTile) {
      let maxAllowedDist = (currentTile.isNarrow ? ROAD_W * 0.45 : ROAD_W) / 2;
      car.onRoad = bestRoadDist <= maxAllowedDist + 5;

      // HÍD SZALAGKORLÁT ÜTKÖZÉS
      if (currentTile.isOverpass && bestRoadDist > maxAllowedDist - 8) {
          // Visszapattintás és lassítás
          car.x -= Math.cos(car.angle) * car.speed * dt * 1.5;
          car.y -= Math.sin(car.angle) * car.speed * dt * 1.5;
          car.speed *= 0.5;
          bestRoadDist = maxAllowedDist - 8;
          doFlash('SZALAGKORLÁT!', '#ffaa00');
          car.onRoad = true; 
      } 
      // ZUHANÁS (ha nem híd, vagy nincs hex)
      else if (!car.onHex || bestRoadDist > maxAllowedDist + 2) { 
          car.falling = true; 
          car.fallAlpha = 1; 
          car.trail = []; 
          car.skidMarks = []; 
          doFlash('LEESTÉL!', '#ff3366');
      }
      
      // ALSÓ PÁLYÁN ÜTKÖZÉS A HÍD OSZLOPÁVAL
      if (!car.falling && !currentTile.isOverpass && !checkHighUp(car.tIdx)) {
          for (let i = 0; i < tiles.length; i++) {
              if (tiles[i].isOverpass) {
                  let distToBridge = distToRoadCenter(car.x, car.y, tiles[i]);
                  let bridgeW = (tiles[i].isNarrow ? ROAD_W * 0.45 : ROAD_W) / 2;
                  if (distToBridge < bridgeW + 18) {
                      car.x = px;
                      car.y = py;
                      car.speed *= -0.4;
                      doFlash('OSZLOPNAK ÜTKÖZTÉL!', '#ff3366');
                  }
              }
          }
      }
  }

  if (car.onRoad && !car.falling && !finished && currentTile) {
    if (!currentTile.visited) {
      currentTile.visited = true;
      car.cpsHit++;
      doFlash(`SZEKTOR ${car.cpsHit}/${totalCPs}`, '#00ffff');
    }
  }

  const isHighUp = checkHighUp(car.tIdx);
  const isSkidding = car.onRoad && !finished && brake && car.speed > 60; 
  
  getWheelCoords(car.angle, isSkidding, isHighUp);

  if (!car.falling && car.speed>5) {
    car.trail.push({x:car.x,y:car.y, high: isHighUp});
    if(car.trail.length>160) car.trail.shift();
  }

  if (raceStart===0 && car.speed>5) raceStart=ts;
  if (raceStart>0 && !finished) raceTime=ts-raceStart;

  if (!car.falling && !finished && crossedFinish(px,py)) {
    if (car.cpsHit >= totalCPs) {
      finished = true;
      let isGold = false;
      let prevBest = savedRecords[currentLevelIdx];
      
      if (!prevBest || raceTime < prevBest) {
          savedRecords[currentLevelIdx] = raceTime;
          saveRecords();
          isNewRecord = true;
      }
      if (raceTime <= GOLD_TIME) isGold = true;
      
      doFlash(isNewRecord ? 'ÚJ REKORD!' : 'CÉL!', '#00ffcc');
      setTimeout(()=>showFinish(isGold), 2500); 
    } else {
      doFlash('KIHAGYTÁL EGY SZEKTORT!', '#ff3366');
      car.speed *= 0.8; 
    }
  }

  const ahead = 140+car.speed*0.2;
  const tx=car.x+Math.cos(car.angle)*ahead, ty=car.y+Math.sin(car.angle)*ahead;
  cam.x += (tx-cam.x)*0.08;
  cam.y += (ty-cam.y)*0.08;
  
  const targetZoom = car.falling ? 0.6 : (car.onRoad ? 0.55 - (car.speed/MAX_ROAD)*0.15 : 0.5);
  cam.zoom += (targetZoom - cam.zoom) * 0.05;

  updHUD();
}

function w2s(wx,wy){ return { sx:(wx-cam.x)*cam.zoom+cv.width/2, sy:(wy-cam.y)*cam.zoom+cv.height/2 }; }

function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, 0, cv.height);
  bg.addColorStop(0, '#1a8cff');
  bg.addColorStop(1, '#80d4ff');
  ctx.fillStyle=bg; ctx.fillRect(0,0,cv.width,cv.height);
}

function drawTileGlow(sx, sy, s) {
  ctx.save(); ctx.translate(sx, sy); ctx.scale(s, s);
  ctx.beginPath();
  for (let i=0; i<6; i++) {
    const a = Math.PI/3*i;
    i===0 ? ctx.moveTo(R*Math.cos(a), R*Math.sin(a)) : ctx.lineTo(R*Math.cos(a), R*Math.sin(a));
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)'; 
  ctx.lineWidth = 14; ctx.stroke();
  ctx.restore();
}

function drawSkidMarks(isHigh) {
  if (car.skidMarks.length < 2) return;
  ctx.lineWidth = 4 * cam.zoom;
  ctx.lineCap = 'butt';

  for (const side of ['l', 'r']) {
    ctx.beginPath();
    ctx.strokeStyle = (side === 'l') ? `rgba(10,10,10,0.6)` : `rgba(15,15,15,0.6)`; 
    let last = null;
    for (let i = 0; i < car.skidMarks.length; i++) {
      const mark = car.skidMarks[i];
      if (mark.wheel !== side) continue;
      if (mark.high !== isHigh) { last = null; continue; }
      
      const p1 = w2s(mark.p1.x, mark.p1.y);
      if (last === null) { ctx.moveTo(p1.sx, p1.sy); } 
      else {
        if (Math.hypot(mark.p1.x - last.p1.x, mark.p1.y - last.p1.y) < R*0.2) ctx.lineTo(p1.sx, p1.sy);
        else ctx.moveTo(p1.sx, p1.sy);
      }
      last = mark;
    }
    ctx.stroke();
  }
}

function drawTrail(isHigh) {
  ctx.beginPath();
  let drawing = false;
  for(let i=1; i<car.trail.length; i++){
    const t0 = car.trail[i-1];
    const t1 = car.trail[i];
    if (t0.high !== isHigh || t1.high !== isHigh) { drawing = false; continue; }
    const pa=w2s(t0.x, t0.y);
    const pb=w2s(t1.x, t1.y);
    if (!drawing) { ctx.moveTo(pa.sx, pa.sy); drawing = true; }
    ctx.lineTo(pb.sx, pb.sy);
  }
  ctx.strokeStyle=`rgba(255,50,0,0.5)`; ctx.lineWidth=4*cam.zoom; ctx.lineCap='round'; ctx.stroke();
}

function drawScene() {
  drawBackground();
  const half=TSIZE/2;
  const s=cam.zoom;
  const isHighUp = checkHighUp(car.tIdx);

  // ALSÓ RÉTEG
  for (const t of tiles) {
    if (t.isOverpass) continue;
    const {sx,sy}=w2s(t.cx,t.cy);
    if(sx<-half*s*2||sx>cv.width+half*s*2||sy<-half*s*2||sy>cv.height+half*s*2) continue;
    ctx.save(); ctx.translate(sx,sy); ctx.scale(s,s);
    ctx.drawImage(renderTile(t),-half,-half);
    ctx.restore();
    if (t.visited) drawTileGlow(sx, sy, s); 
  }
  drawSkidMarks(false); 
  if(car.trail.length>1 && !car.falling) drawTrail(false);
  if (!isHighUp) drawCar();

  // FELSŐ RÉTEG
  for (const t of tiles) {
    if (!t.isOverpass) continue;
    const {sx,sy}=w2s(t.cx,t.cy);
    ctx.save(); ctx.translate(sx,sy); ctx.scale(s,s);
    ctx.drawImage(renderTile(t),-half,-half);
    ctx.restore();
    if (t.visited) drawTileGlow(sx, sy, s);
  }
  drawSkidMarks(true); 
  if(car.trail.length>1 && !car.falling) drawTrail(true);
  if (isHighUp) drawCar();
}

function drawF1Wheels(wheelCoords, s) {
  const fw_l = 16, fw_w = 9;  
  const rw_l = 18, rw_w = 11; 

  for (const id in wheelCoords) {
    const w = wheelCoords[id];
    const {sx, sy} = w2s(w.x, w.y);
    const length = (id[0] === 'f') ? fw_l : rw_l;
    const width = (id[0] === 'f') ? fw_w : rw_w;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(w.rot + Math.PI/2);
    ctx.scale(s, s);

    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(-width/2 + 2, -length/2 + 2, width, length);

    ctx.fillStyle = (car.onRoad && !car.falling) ? '#181818' : '#222'; 
    ctx.beginPath(); ctx.roundRect(-width/2, -length/2, width, length, 2); ctx.fill();

    ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(0, 0, width*0.4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, width*0.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(0, 0, width*0.12, 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }
}

function drawCar() {
  const {sx,sy}=w2s(car.x,car.y);
  const s=cam.zoom;
  const isHighUp = checkHighUp(car.tIdx);
  const wheelCoords = getWheelCoords(car.angle, false, isHighUp);

  drawF1Wheels(wheelCoords, s); 

  ctx.save();
  ctx.globalAlpha=car.falling?Math.max(0,car.fallAlpha):1;
  ctx.translate(sx,sy); ctx.rotate(car.angle+Math.PI/2); ctx.scale(s,s);

  const L = CAR_L, W = CAR_W;
  const floorW = 32; 
  const floorL = L * 0.6;
  
  ctx.save(); ctx.translate(5,5); ctx.globalAlpha*=0.4;
  ctx.fillStyle='#000'; ctx.beginPath();
  ctx.roundRect(-floorW/2, -L*0.2, floorW, floorL, 3); ctx.fill();
  ctx.moveTo(0, -L*0.8); ctx.lineTo(W, -L*0.5); ctx.lineTo(W, L*0.45); ctx.lineTo(-W, L*0.45); ctx.lineTo(-W, -L*0.5);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  ctx.fillStyle='#1c1d21';
  ctx.beginPath(); ctx.roundRect(-floorW/2, -L*0.2, floorW, floorL, 3); ctx.fill();

  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-W*0.25, -L*0.65); ctx.lineTo(-CAR_FRONT_TRACK/2, -CAR_FRONT_AXLE);
  ctx.moveTo(-W*0.35, -L*0.45); ctx.lineTo(-CAR_FRONT_TRACK/2, -CAR_FRONT_AXLE);
  ctx.moveTo(W*0.25, -L*0.65);  ctx.lineTo(CAR_FRONT_TRACK/2, -CAR_FRONT_AXLE);
  ctx.moveTo(W*0.35, -L*0.45);  ctx.lineTo(CAR_FRONT_TRACK/2, -CAR_FRONT_AXLE);
  
  ctx.moveTo(-W*0.5, L*0.35);  ctx.lineTo(-CAR_REAR_TRACK/2, CAR_REAR_AXLE);
  ctx.moveTo(-W*0.5, L*0.2);   ctx.lineTo(-CAR_REAR_TRACK/2, CAR_REAR_AXLE);
  ctx.moveTo(W*0.5, L*0.35);   ctx.lineTo(CAR_REAR_TRACK/2, CAR_REAR_AXLE);
  ctx.moveTo(W*0.5, L*0.2);    ctx.lineTo(CAR_REAR_TRACK/2, CAR_REAR_AXLE);
  ctx.stroke();

  ctx.fillStyle = '#111'; ctx.fillRect(-W*1.8, -L*0.85, W*3.6, L*0.12);
  ctx.fillStyle = '#cc0022'; ctx.fillRect(-W*1.7, -L*0.83, W*3.4, L*0.06);
  ctx.fillStyle = '#111'; ctx.fillRect(-W*1.8, -L*0.9, W*0.15, L*0.25); ctx.fillRect(W*1.65, -L*0.9, W*0.15, L*0.25);
  
  ctx.fillStyle = '#111'; ctx.fillRect(-W*1.6, L*0.45, W*3.2, L*0.15);
  ctx.fillStyle = '#cc0022'; ctx.fillRect(-W*1.5, L*0.48, W*3.0, L*0.08);
  ctx.fillStyle = '#111'; ctx.fillRect(-W*1.6, L*0.42, W*0.15, L*0.25); ctx.fillRect(W*1.45, L*0.42, W*0.15, L*0.25);

  ctx.fillStyle = '#cc0022'; 
  ctx.beginPath();
  ctx.moveTo(0, -L*0.85); ctx.lineTo(W*0.3, -L*0.6); ctx.lineTo(W*0.5, -L*0.2); ctx.lineTo(W*1.1, 0);       
  ctx.lineTo(W*0.8, L*0.3); ctx.lineTo(W*0.3, L*0.48); ctx.lineTo(-W*0.3, L*0.48); ctx.lineTo(-W*0.8, L*0.3);
  ctx.lineTo(-W*1.1, 0); ctx.lineTo(-W*0.5, -L*0.2); ctx.lineTo(-W*0.3, -L*0.6);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#880011';
  ctx.beginPath(); ctx.moveTo(W*0.5, -L*0.1); ctx.lineTo(W*1.0, 0); ctx.lineTo(W*0.7, L*0.25); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-W*0.5, -L*0.1); ctx.lineTo(-W*1.0, 0); ctx.lineTo(-W*0.7, L*0.25); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(W*0.7, -L*0.05, W*0.3, L*0.05, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-W*0.7, -L*0.05, W*0.3, L*0.05, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#050505'; ctx.beginPath(); ctx.ellipse(0, -L*0.05, W*0.4, L*0.18, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffee00'; ctx.beginPath(); ctx.arc(0, -L*0.05, W*0.25, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#aa0011'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.ellipse(0, -L*0.05, W*0.45, L*0.22, 0, -Math.PI/4, Math.PI+Math.PI/4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -L*0.05 - L*0.22); ctx.lineTo(0, -L*0.05 - L*0.45); ctx.stroke();

  ctx.fillStyle='#fff'; ctx.font=`bold ${CAR_W*0.9}px Courier New`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; 
  ctx.save(); ctx.translate(0, L*0.25); ctx.fillText(String(currentLevelIdx+1), 0, 0); ctx.restore();

  ctx.restore();
}

function updHUD(){
  document.getElementById('hT').textContent=fmt(raceTime);
  document.getElementById('hS').textContent=Math.round(car.speed*0.6);
  document.getElementById('hC').textContent=`${car.cpsHit}/${totalCPs}`;
}

let flT=null;
function doFlash(t, color='#00ffff'){
  const el=document.getElementById('fl');
  el.textContent=t; 
  el.style.color = color;
  el.style.textShadow = `0 0 20px ${color}, 0 4px 10px rgba(0,0,0,0.8)`;
  el.style.opacity='1';
  clearTimeout(flT); flT=setTimeout(()=>el.style.opacity='0',2500);
}

function showFinish(isGold){
  state='finish';
  const ov=document.getElementById('finishMenu');
  
  // Következő pálya gomb megjenenítése, ha elérhető
  let nextBtnHTML = '';
  if (currentLevelIdx + 1 < LEVEL_DATA.length) {
      const nextUnlocked = savedRecords[currentLevelIdx] !== null && savedRecords[currentLevelIdx] <= GOLD_TIME;
      if (nextUnlocked) {
          nextBtnHTML = `<button class="ob" onclick="loadLevel(${currentLevelIdx + 1})">KÖVETKEZŐ PÁLYA</button>`;
      }
  }

  ov.innerHTML=`
    <h1 style="font-size:clamp(30px,8vw,60px); color:#fff;">${isNewRecord ? 'ÚJ REKORD!' : 'FUTAM VÉGE!'}</h1>
    <p style="margin-bottom:20px;">IDŐ<br><span style="font-size:46px;color:#00ffcc;font-weight:900;text-shadow:0 0 20px #00ffcc">${fmt(raceTime)}</span></p>
    
    ${isGold 
        ? `<p style="color:#ffcc00;font-size:18px;letter-spacing:2px;font-weight:bold; margin-bottom:30px; text-shadow:0 0 10px #ffcc00;">🏆 ARANY IDŐ MEGSZEREZVE! 🏆</p>` 
        : `<p style="color:#ff3366;font-size:16px;letter-spacing:2px;font-weight:bold; margin-bottom:30px;">CÉL: ${fmt(GOLD_TIME)} AZ ARANYHOZ</p>`
    }
    
    <div style="display:flex; gap:15px; flex-wrap:wrap; justify-content:center;">
        <button class="ob" onclick="initMenu()">MENÜ</button>
        <button class="ob" onclick="loadLevel(${currentLevelIdx})">ÚJRA</button>
        ${nextBtnHTML}
    </div>
  `;
  ov.style.display='flex';
}

function loop(ts){
  if (state === 'racing') {
      update(ts);
      drawScene();
  } else if (state === 'finish') {
      drawScene(); // Csak rajzolunk, hogy látszódjon a megállt autó
  } else {
      drawBackground(); // Főmenü háttér
  }
  requestAnimationFrame(loop);
}

// Indítás
initMenu();
requestAnimationFrame(loop);
</script>
</body>
</html>
