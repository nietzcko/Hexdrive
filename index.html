<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HEX RACER - CHAMPIONSHIP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  background:#04060a; overflow:hidden; width:100vw; height:100vh; font-family:'Courier New',monospace; color:#e0f4ff; 
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: none;
}
#c { display:block; position:fixed; inset:0; width:100%; height:100%; touch-action:none; }

#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: grid; grid-template-columns: 1fr auto 1fr;
  padding: 16px 24px; pointer-events: none; z-index: 10; display: none;
}
.hud-center { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
#hT {
  font-size: clamp(32px, 8vw, 42px); font-weight: 900; color: #fff; letter-spacing: 2px;
  text-shadow: 0 4px 10px rgba(0,0,0,0.8), 0 0 15px rgba(0,255,255,0.4);
}
#hPR { font-size: 14px; font-weight: bold; color: #ffcc00; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }

.icon-btn {
  background: rgba(0, 20, 50, 0.85); border: 2px solid #00cfff; color: #fff;
  border-radius: 8px; cursor: pointer; transition: all .15s; pointer-events: auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
}
#btnMenu { width: 44px; height: 44px; font-size: 26px; }
#btnRetry { position: fixed; right: 24px; bottom: 140px; width: 60px; height: 60px; font-size: 32px; z-index: 50; display: none; }

#ctrl {
  position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px 20px; display: none; z-index: 10; gap: 16px; pointer-events: none;
}
.cb {
  flex: 1; max-width: 220px; height: 80px; pointer-events: auto;
  background: rgba(0, 20, 50, 0.85); border: 3px solid rgba(0, 255, 255, 0.3); border-radius: 18px;
  display: flex; align-items: center; justify-content: center; font-size: 36px; color: rgba(0, 255, 255, 0.5);
}
.cb.on { background: rgba(0, 100, 255, 0.9); border-color: #fff; color: #fff; }

#fl {
  position: fixed; top: 35%; left: 50%; transform: translate(-50%,-50%);
  font-size: clamp(20px,6vw,46px); font-weight: 900; text-align: center;
  color: #00ffff; opacity: 0; z-index: 15; transition: opacity 0.2s;
}

#lvlSel { position: fixed; inset: 0; background: #04060a; z-index: 100; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow-y: auto; }
#lvlGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 800px; }
.lvlBtn { background: rgba(0, 30, 60, 0.8); border: 2px solid #00cfff; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; }
.lvlBtn.locked { background: rgba(20, 20, 20, 0.8); border-color: #444; cursor: not-allowed; opacity: 0.6; }

#finishMenu { position: fixed; inset: 0; background: rgba(0, 10, 25, 0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); text-align: center; }
.ob { font-size: 14px; font-weight: 900; padding: 12px 24px; background: rgba(0, 20, 40, 0.9); border: 2px solid #00cfff; color: #fff; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin: 5px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div></div>
  <div class="hud-center">
      <div id="hT">00:00.000</div>
      <div id="hPR">PR: --:--.---</div>
  </div>
  <div style="display:flex; justify-content:flex-end;"><div id="btnMenu" class="icon-btn" onclick="initMenu()">☰</div></div>
</div>
<div id="btnRetry" class="icon-btn" onclick="loadLevel(currentLevelIdx)">⟳</div>
<div id="fl"></div>
<div id="ctrl"><div class="cb" id="bL"><span>◀</span></div><div class="cb" id="bR"><span>▶</span></div></div>
<div id="lvlSel">
  <div style="position:absolute; top:16px; right:20px; color:rgba(0, 255, 255, 0.6); font-size:14px;">v2.5.1</div>
  <h1 style="color:#fff; font-size:40px; margin-bottom:20px;">HEX RACER</h1>
  <div id="lvlGrid"></div>
</div>
<div id="finishMenu"></div>

<script>
const R=340, ROAD_W=240, GOLD_TIME=300000;
const CAR_L=60, CAR_W=12, CAR_FRONT_TRACK=46, CAR_REAR_TRACK=46, CAR_FRONT_AXLE=CAR_L*0.68, CAR_REAR_AXLE=CAR_L*0.32;
const MAX_ROAD=500, MAX_HEX=140, ACCEL=220, BRAKE=800, COAST=100, STEER=1.5;

const cv=document.getElementById('c'), ctx=cv.getContext('2d');
function rsz(){ cv.width=innerWidth; cv.height=innerHeight; }
window.addEventListener('resize', rsz); rsz();

const LEVEL_DATA=[[[3,0,'S'],[3,0],[3,1],[4,1],[4,1],[4,0],[3,0],[3,0,'F']],[[3,0,'S'],[3,1],[4,2],[5,1],[4,0],[3,1],[4,2],[5,0],[3,0,'F']],[[3,0,'S'],[3,0],[3,1],[4,1],[4,1],[4,1,'O'],[4,1],[4,2],[5,3],[0,2],[5,1,'F']],[[4,1,'S'],[4,1],[4,2],[5,2],[5,2],[5,3],[0,3],[0,3],[0,4],[1,4],[1,4],[1,5],[2,5],[2,0],[3,0,'F']],[[3,0,'S'],[3,0],[3,0,'O'],[3,0],[3,1],[4,2],[5,1],[4,1],[4,1],[4,1,'O'],[4,1],[4,2],[5,1,'F']],[[3,0,'S'],[3,0,'N'],[3,0,'N'],[3,1,'N'],[4,1],[4,2],[5,1,'N'],[4,0,'N'],[3,0,'F']],[[3,0,'S'],[3,1],[4,1],[4,1,'N'],[4,1],[4,1,'O'],[4,1],[4,2,'N'],[5,3,'N'],[0,3,'N'],[0,2],[5,1,'F']],[[4,1,'S'],[4,2],[5,2,'N'],[5,2,'N'],[5,3],[0,4],[1,4,'N'],[1,4,'N'],[1,5],[2,0],[3,0,'N'],[3,0,'N'],[3,1,'F']],[[3,0,'S'],[3,0,'N'],[3,1],[4,1],[4,1,'O'],[4,1],[4,2,'N'],[5,2,'N'],[5,3],[0,3],[0,3,'O'],[0,3],[0,4,'N'],[1,5,'N'],[2,0,'F']],[[3,0,'S'],[3,0,'N'],[3,1],[4,2,'N'],[5,2,'N'],[5,1],[4,1],[4,1,'O'],[4,1],[4,0,'N'],[3,1,'N'],[4,2],[5,2],[5,2,'O'],[5,2],[5,3,'N'],[0,4,'N'],[1,5],[2,0,'F']]];
let savedRecords=Array(LEVEL_DATA.length).fill(null);
try{const s=localStorage.getItem('hexRacerRecords'); if(s)savedRecords=JSON.parse(s);}catch(e){}

let trackTiles=[], allTiles=[], car={}, cam={}, state='menu', currentLevelIdx=0, raceStart=0, raceTime=0, finished=false, isNewRecord=false;
const tCache=new Map(), APOTHEM=R*Math.sqrt(3)/2, TSIZE=Math.ceil(R*2+10);

function fmt(ms){ if(!ms)return '--:--.---'; const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), c=String(Math.floor(ms%1000)).padStart(3,'0'); return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${c}`; }

function initMenu(){
    state='menu'; document.getElementById('finishMenu').style.display='none'; document.getElementById('hud').style.display='none'; document.getElementById('ctrl').style.display='none'; document.getElementById('btnRetry').style.display='none'; document.getElementById('lvlSel').style.display='flex';
    const g=document.getElementById('lvlGrid'); g.innerHTML=''; let unl=true;
    savedRecords.forEach((r,i)=>{
        const b=document.createElement('div'); b.className='lvlBtn'+(unl?'':' locked');
        b.innerHTML=`<div style="font-weight:900;color:#fff">LEVEL ${i+1}</div><div style="font-size:12px;color:#00ffff">${unl?'BEST: '+fmt(r):'LOCKED'}</div>`;
        if(unl)b.onclick=()=>loadLevel(i); g.appendChild(b); if(!r||r>GOLD_TIME)unl=false;
    });
}

function loadLevel(idx){
    currentLevelIdx=idx; document.getElementById('lvlSel').style.display='none'; document.getElementById('hud').style.display='grid'; document.getElementById('ctrl').style.display='flex'; document.getElementById('btnRetry').style.display='flex';
    document.getElementById('hPR').textContent='PR: '+(savedRecords[idx]?fmt(savedRecords[idx]):'--:--.---');
    tCache.clear(); buildTrack(); resetGame(); state='racing';
}

function buildTrack(){
    trackTiles=[]; let cx=0, cy=0, centerMap=new Set();
    LEVEL_DATA[currentLevelIdx].forEach((s,i)=>{
        const t={idx:i,cx,cy,entry:s[0],exit:s[1],isStart:s[2]==='S',isFinish:s[2]==='F',isOverpass:s[2]==='O',isNarrow:s[2]==='N',isDeco:false,visited:false};
        trackTiles.push(t); centerMap.add(`${Math.round(cx)}_${Math.round(cy)}`);
        const a=Math.PI/3*t.exit+Math.PI/6, ex=cx+APOTHEM*Math.cos(a), ey=cy+APOTHEM*Math.sin(a);
        const na=Math.PI/3*((t.exit+3)%6)+Math.PI/6; cx=ex-APOTHEM*Math.cos(na); cy=ey-APOTHEM*Math.sin(na);
    });
    allTiles=[...trackTiles]; let decoIdx=0; const biomes=['meadow','meadow','wheat','stone','forest','dirt'];
    trackTiles.forEach(t=>{
        for(let e=0;e<6;e++){
            const a=Math.PI/3*e+Math.PI/6, acx=t.cx+Math.cos(a)*R*Math.sqrt(3), acy=t.cy+Math.sin(a)*R*Math.sqrt(3);
            if(!centerMap.has(`${Math.round(acx)}_${Math.round(acy)}`)){
                centerMap.add(`${Math.round(acx)}_${Math.round(acy)}`);
                allTiles.push({cx:acx,cy:acy,isDeco:true,biome:biomes[Math.floor(Math.random()*biomes.length)],isOverpass:false});
            }
        }
    });
}

function resetGame(){
    const st=trackTiles[0], emA=Math.PI/3*st.exit+Math.PI/6, em0A=Math.PI/3*st.entry+Math.PI/6;
    car={x:st.cx,y:st.cy,angle:Math.atan2(Math.sin(emA)-Math.sin(em0A),Math.cos(emA)-Math.cos(em0A)),speed:0,trail:[],skidMarks:[],falling:false,fallAlpha:1,tIdx:0,onRoad:true,cpsHit:0};
    cam={x:car.x,y:car.y,angle:car.angle,zoom:1.0}; raceStart=0; raceTime=0; finished=false; isNewRecord=false;
}

function renderTile(t){
    const key=`${t.isDeco?t.biome:t.idx}_${t.visited}`; if(tCache.has(key))return tCache.get(key);
    const c=document.createElement('canvas'); c.width=c.height=TSIZE; const g=c.getContext('2d'), mid=TSIZE/2;
    const path=(p=0)=>{ g.beginPath(); for(let i=0;i<6;i++){ const a=Math.PI/3*i; g[i===0?'moveTo':'lineTo'](mid+(R+p)*Math.cos(a),mid+(R+p)*Math.sin(a)); } g.closePath(); };
    if(t.isDeco){
        const colors={'meadow':['#5cd639','#4ab32b'],'wheat':['#e6c300','#cca300'],'stone':['#8c8c8c','#666666'],'forest':['#226622','#144014'],'dirt':['#8b5a2b','#6b421a']}[t.biome];
        g.fillStyle=colors[0]; path(2); g.fill(); g.save(); path(); g.clip(); g.strokeStyle=colors[1]; g.lineWidth=3;
        for(let x=0;x<TSIZE;x+=60){ g.beginPath();g.moveTo(x,0);g.lineTo(x,TSIZE);g.stroke(); } g.restore();
    }else{
        path(2); g.fillStyle='#5cd639'; g.fill(); g.save(); path(); g.clip();
        const bz={p0:{x:mid+APOTHEM*Math.cos(Math.PI/3*t.entry+Math.PI/6),y:mid+APOTHEM*Math.sin(Math.PI/3*t.entry+Math.PI/6)},p3:{x:mid+APOTHEM*Math.cos(Math.PI/3*t.exit+Math.PI/6),y:mid+APOTHEM*Math.sin(Math.PI/3*t.exit+Math.PI/6)}};
        bz.cp1={x:mid*0.5+bz.p0.x*0.5,y:mid*0.5+bz.p0.y*0.5}; bz.cp2={x:mid*0.5+bz.p3.x*0.5,y:mid*0.5+bz.p3.y*0.5};
        const w=t.isNarrow?ROAD_W*0.45:ROAD_W;
        const draw=(lw,s)=>{ g.beginPath(); g.moveTo(bz.p0.x,bz.p0.y); g.bezierCurveTo(bz.cp1.x,bz.cp1.y,bz.cp2.x,bz.cp2.y,bz.p3.x,bz.p3.y); g.strokeStyle=s; g.lineWidth=lw; g.stroke(); };
        if(t.isOverpass){ g.shadowBlur=30; g.shadowColor='rgba(0,0,0,0.5)'; draw(w+20,'#999'); g.shadowBlur=0; draw(w+10,'#fff'); }
        draw(w+15,'#222'); draw(w,'#444'); draw(w*0.4,'#555');
        if(t.isStart){ g.strokeStyle='#0f0'; g.lineWidth=15; g.beginPath(); g.moveTo(bz.p0.x-20,bz.p0.y); g.lineTo(bz.p0.x+20,bz.p0.y); g.stroke(); }
        g.restore();
    }
    tCache.set(key,c); return c;
}

const keys={}, btnL=mkBtn('bL'), btnR=mkBtn('bR');
function mkBtn(id){ const e=document.getElementById(id), s={v:false}; e.onmousedown=e.ontouchstart=()=>{s.v=true;e.classList.add('on')}; e.onmouseup=e.onmouseleave=e.ontouchend=()=>{s.v=false;e.classList.remove('on')}; return s; }
window.onkeydown=e=>keys[e.key.toLowerCase()]=true; window.onkeyup=e=>keys[e.key.toLowerCase()]=false;

function update(ts){
    const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
    if(car.falling){ car.fallAlpha-=dt; car.speed*=0.9; if(car.fallAlpha<=0)resetGame(); return; }
    const steer=(btnL.v||keys.a||keys.arrowleft?-1:0)+(btnR.v||keys.d||keys.arrowright?1:0);
    const gas=keys.w||keys.arrowup||btnL.v||btnR.v;
    if(finished) car.speed*=0.98; else{ car.speed+=gas?ACCEL*dt:(car.speed>0?-COAST*dt:0); if(keys.s||keys.arrowdown)car.speed-=BRAKE*dt; }
    car.speed=Math.max(0,Math.min(MAX_ROAD,car.speed)); car.angle+=steer*STEER*(0.3+0.7*car.speed/MAX_ROAD)*dt;
    car.x+=Math.cos(car.angle)*car.speed*dt; car.y+=Math.sin(car.angle)*car.speed*dt;
    
    const cur=trackTiles[car.tIdx]; if(cur){
        const bz={p0:edgeMid(cur.cx,cur.cy,cur.entry),p3:edgeMid(cur.cx,cur.cy,cur.exit)};
        bz.cp1={x:cur.cx*0.5+bz.p0.x*0.5,y:cur.cy*0.5+bz.p0.y*0.5}; bz.cp2={x:cur.cx*0.5+bz.p3.x*0.5,y:cur.cy*0.5+bz.p3.y*0.5};
        let minD=Infinity; for(let i=0;i<=10;i++){ const p=bezPt(i/10,bz.p0,bz.cp1,bz.cp2,bz.p3); minD=Math.min(minD,Math.hypot(car.x-p.x,car.y-p.y)); }
        car.onRoad=minD<(cur.isNarrow?ROAD_W*0.3:ROAD_W*0.6);
        if(!car.onRoad && !cur.isOverpass) car.speed*=0.98;
        if(cur.isFinish && minD<100) { finished=true; setTimeout(()=>showFinish(raceTime<GOLD_TIME),1000); }
    }
    
    let dA=car.angle-cam.angle; while(dA>Math.PI)dA-=Math.PI*2; while(dA<-Math.PI)dA+=Math.PI*2;
    cam.angle+=dA*0.1; cam.x+=(car.x-cam.x)*0.1; cam.y+=(car.y-cam.y)*0.1;
    if(raceStart===0&&car.speed>1)raceStart=ts; if(raceStart>0&&!finished)raceTime=ts-raceStart;
    document.getElementById('hT').textContent=fmt(raceTime);
}

function bezPt(t,p0,c1,c2,p3){ const u=1-t; return {x:u*u*u*p0.x+3*u*u*t*c1.x+3*u*t*t*c2.x+t*t*t*p3.x,y:u*u*u*p0.y+3*u*u*t*c1.y+3*u*t*t*c2.y+t*t*t*p3.y}; }
function edgeMid(cx,cy,e){ const a=Math.PI/3*e+Math.PI/6; return {x:cx+APOTHEM*Math.cos(a),y:cy+APOTHEM*Math.sin(a)}; }

function draw(){
    ctx.fillStyle='#1a8cff'; ctx.fillRect(0,0,cv.width,cv.height);
    if(state==='menu')return;
    ctx.save(); ctx.translate(cv.width/2,cv.height*0.7); ctx.rotate(-cam.angle-Math.PI/2); ctx.scale(cam.zoom,cam.zoom); ctx.translate(-cam.x,-cam.y);
    allTiles.forEach(t=>{ 
        if(Math.hypot(t.cx-cam.x,t.cy-cam.y)>2000)return;
        ctx.save(); ctx.translate(t.cx,t.cy); ctx.drawImage(renderTile(t),-TSIZE/2,-TSIZE/2); ctx.restore();
    });
    ctx.save(); ctx.translate(car.x,car.y); ctx.rotate(car.angle+Math.PI/2);
    ctx.fillStyle='#f00'; ctx.fillRect(-CAR_W/2,-CAR_L/2,CAR_W,CAR_L); ctx.restore();
    ctx.restore();
}

function showFinish(g){ state='finish'; const m=document.getElementById('finishMenu'); m.style.display='flex'; m.innerHTML=`<h1 style="color:#fff">${g?'GOLD!':'FINISHED'}</h1><p>${fmt(raceTime)}</p><button class="ob" onclick="initMenu()">MENU</button>`; }

let lastTs=0;
function loop(ts){ update(ts); draw(); requestAnimationFrame(loop); }
initMenu(); requestAnimationFrame(loop);
</script>
</body>
</html>
