<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }

<body>

<div id="hud">

<script>
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    this.beginPath();this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);
    this.closePath();return this;
  };
}

// ── CONFIG ────────────────────────────────────────────
const R       = 1020;
const ROAD_W  = 420;
const GOLD_TIME = 300000;

const CAR_L  = 60;
const CAR_W  = 12;
const CAR_FRONT_TRACK = 46;
const CAR_REAR_TRACK  = 46;
const CAR_FRONT_AXLE  = CAR_L * 0.68;
const CAR_REAR_AXLE   = CAR_L * 0.32;

const MAX_ROAD = 900;
const MAX_HEX  = 280;
const ACCEL    = 600;
const BRAKE    = 2000;
const COAST    = 140;
const STEER    = 1.1;

// Steering penalty: rapid left-right toggling costs speed
const STEER_PENALTY = 60;   // speed units/s lost per steer reversal

// Grass: gentler slowdown
const GRASS_DRAG = 1.5;     // was 1.5 — speed multiplied by (1 - GRASS_DRAG*dt)

// Camera
const CAM_POS_LERP   = 0.05;
const CAM_ANGLE_LERP = 0.04;
const CAM_ZOOM_LERP  = 0.025;
const CAM_AHEAD      = 0.35;
const ZOOM_BASE      = 0.48;   // slightly further back than before (was 0.55)
const ZOOM_RANGE     = 0.18;

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
function rsz(){ cv.width=innerWidth; cv.height=innerHeight; }
rsz(); window.addEventListener('resize', rsz);

const LEVEL_DATA = [
  // 1-5 flowing (no sharp 

  [[3,0,"S"],[3,5],[2,4],[1,3],[0,2],[5,1],[4,2,"O"],[5,3],[0,4],[1,5],[2,0],[3,5,"O"],[2,4,"O"],[1,3,"N"],[0,2,"N"],[5,3,"N"],[0,2,"N"],[5,3,"N"],[0,2,"N"],[5,3,"N"],[0,2,"N"],[5,3,"N"],[0,5,"N"],[2,3,"N"],[0,1,"N"],[4,3,"F"]],
  [[3,0,'S'],[3,1],[4,0],[3,1],[4,0],[3,1],[4,1],[4,5],[2,1],[4,0],[3,0,'F']],
  [[3,0,'S'],[3,1],[4,0],[3,5],[2,0],[3,1],[4,0],[3,5],[2,0],[3,0,'F']],
  [[3,0,'S'],[3,1],[4,1],[4,1,'O'],[4,0],[3,1],[4,0],[3,5],[2,1],[4,0],[3,0,'F']],
  [[3,0,'S'],[3,1,'N'],[4,0,'N'],[3,5],[2,0],[3,1],[4,0],[3,1,'N'],[4,0,'N'],[3,0,'F']],

  // 6-10 Sharp switchbacks (ex: exit 1 -> enter 4, exit 5 -> enter 2, exit 1 -> enter 4 = zigzag)
  [[3,0,'S'],[3,1],[4,5],[2,1],[4,5],[2,0],[3,1],[4,5],[2,1],[4,0],[3,0,'F']],
  [[3,0,'S'],[3,1,'N'],[4,5],[2,1],[4,5],[2,1,'N'],[4,0],[3,1],[4,5],[2,1,'N'],[4,0,'F']],
  [[3,0,'S'],[3,1],[4,5],[2,1],[4,1,'O'],[4,5],[2,1],[4,0],[3,1],[4,5],[2,0,'F']],
  [[3,0,'S'],[3,1,'N'],[4,5],[2,1],[4,1,'O'],[4,5],[2,1],[4,5],[2,0],[3,1,'N'],[4,0,'F']],
  [[3,0,'S'],[3,1],[4,5,'N'],[2,1,'N'],[4,5],[2,1],[4,1,'O'],[4,0],[3,1],[4,5,'N'],[2,1,'N'],[4,0,'F']]
];
const LEVEL_THEMES = ['grass','grass','grass','grass','grass','desert','desert','snow','snow','urban'];

let savedRecords = Array(LEVEL_DATA.length).fill(null);
try{ const s=localStorage.getItem('hexRacerRecords_v3');if(s)savedRecords=JSON.parse(s); }catch(e){}
function saveRecords(){ try{ localStorage.setItem('hexRacerRecords_v3',JSON.stringify(savedRecords)); }catch(e){} }

let SEQ=[], currentLevelIdx=0, totalCPs=0;

function fmt(ms){
  if(ms===null||ms===undefined)return '--:--.---';
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),c=String(Math.floor(ms%1000)).padStart(3,'0');
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${c}`;
}

function initMenu(){
  document.getElementById('c').classList.add('blur-bg');
  document.getElementById('ctrl').style.display='none';
  document.getElementById('btnRetry').style.display='none';
  document.getElementById('btnMenu').style.display='none';
  
  // Load level 0 in background for visuals
  currentLevelIdx=0;
  const tlvl = LEVEL_DATA[0];
  SEQ=tlvl.map(t=>({entry:t[0],exit:t[1],isStart:t[2]==='S',isFinish:t[2]==='F',isOverpass:t[2]==='O',isNarrow:t[2]==='N'}));
  tCache.clear(); buildTrack();
  cam={x:trackTiles[0].cx,y:trackTiles[0].cy,angle:0,zoom:0.6};
  car=null; // no car in menu

  state='menu';
  document.getElementById('finishMenu').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('ctrl').style.display='none';
  document.getElementById('btnRetry').style.display='none';
  document.getElementById('btnMenu').style.display='none';
  
  
  const grid=document.getElementById('lvlGrid');grid.innerHTML='';
  let unlocked=true;
  for(let i=0;i<LEVEL_DATA.length;i++){
    const best=savedRecords[i];
    const btn=document.createElement('div');
    btn.className='lvlBtn'+(unlocked?'':' locked');
    btn.innerHTML=`<div class="ln">LEVEL ${i+1}</div>`+
      (unlocked?`<div class="lt">BEST: <span style="color:#fff">${fmt(best)}</span></div>`
               :`<div class="lt" style="color:#777;">GOLD REQUIRED TO UNLOCK</div>`);
    if(unlocked)btn.onclick=()=>loadLevel(i);
    grid.appendChild(btn);
    if(best===null||best>GOLD_TIME)unlocked=false;
  }
  document.getElementById('lvlSel').style.display='flex';
}

function loadLevel(idx){
  currentLevelIdx=idx;
  SEQ=LEVEL_DATA[idx].map(t=>({entry:t[0],exit:t[1],isStart:t[2]==='S',isFinish:t[2]==='F',isOverpass:t[2]==='O',isNarrow:t[2]==='N'}));
  document.getElementById('lvlSel').style.display='none';
  document.getElementById('finishMenu').style.display='none';
  document.getElementById('hud').style.display='grid';
  document.getElementById('ctrl').style.display='block';
  document.getElementById('btnRetry').style.display='flex';
  document.getElementById('btnMenu').style.display='flex';
  
  document.getElementById('btnRetry').style.display='flex';
  document.getElementById('hPR').textContent=`PR: ${savedRecords[idx]?fmt(savedRecords[idx]):'--:--.---'}`;
  resetGame();state='racing';lastTs=performance.now();document.getElementById('c').classList.remove('blur-bg');
}

// ── HEX MATH ──────────────────────────────────────────
const APOTHEM = R * Math.sqrt(3) / 2;
function edgeAngle(e){ return Math.PI/3*e+Math.PI/6; }
function edgeMid(cx,cy,e){ return {x:cx+APOTHEM*Math.cos(edgeAngle(e)),y:cy+APOTHEM*Math.sin(edgeAngle(e))}; }
function neighborCenter(cx,cy,exitEdge){
  const a=edgeAngle(exitEdge);
  return {x:cx+Math.cos(a)*APOTHEM*2,y:cy+Math.sin(a)*APOTHEM*2};
}

let trackTiles=[], allTiles=[];

function buildTrack(){
  trackTiles=[];
  let cx=0,cy=0;
  const centerMap=new Set();
  const cTheme = typeof LEVEL_THEMES !== 'undefined' && LEVEL_THEMES[currentLevelIdx] ? LEVEL_THEMES[currentLevelIdx] : 'grass';
  for(let i=0;i<SEQ.length;i++){
    const s=SEQ[i];
    trackTiles.push({idx:i,cx,cy,key:`T_${i}`,entry:s.entry,exit:s.exit,
      isStart:s.isStart||false,isFinish:s.isFinish||false,
      isOverpass:s.isOverpass||false,isNarrow:s.isNarrow||false,isDeco:false,visited:false,theme:cTheme});
    centerMap.add(`${Math.round(cx)}_${Math.round(cy)}`);
    const nc=neighborCenter(cx,cy,s.exit);cx=nc.x;cy=nc.y;
  }
  allTiles=[...trackTiles];
  let decoIdx=0;
  const themeBiomes = {
    grass: ['meadow','meadow','wheat','forest','dirt','meadow'],
    desert: ['dirt','dirt','stone','dirt','wheat','stone'],
    snow: ['stone','stone','meadow','stone','dirt','stone'],
    urban: ['stone','dirt','stone','stone','dirt','stone']
  };
  const biomes = themeBiomes[cTheme] || themeBiomes.grass;
  for(const t of trackTiles){
    for(let e=0;e<6;e++){
      const a=edgeAngle(e);
      const acx=t.cx+Math.cos(a)*APOTHEM*2,acy=t.cy+Math.sin(a)*APOTHEM*2;
      const key=`${Math.round(acx)}_${Math.round(acy)}`;
      if(!centerMap.has(key)){
        centerMap.add(key);
        allTiles.push({idx:'d'+decoIdx++,cx:acx,cy:acy,key:`D_${decoIdx}`,
          isDeco:true,biome:biomes[Math.floor(Math.random()*biomes.length)],isOverpass:false,visited:true,theme:cTheme});
      }
    }
  }
}

function getLocalBezier(tile){
  const lc=TSIZE/2;
  const p0=edgeMid(lc,lc,tile.entry),p3=edgeMid(lc,lc,tile.exit);
  return {p0,cp1:{x:lc*0.5+p0.x*0.5,y:lc*0.5+p0.y*0.5},cp2:{x:lc*0.5+p3.x*0.5,y:lc*0.5+p3.y*0.5},p3};
}
function getWorldBezier(tile){
  const p0=edgeMid(tile.cx,tile.cy,tile.entry),p3=edgeMid(tile.cx,tile.cy,tile.exit);
  return {p0,cp1:{x:tile.cx*0.5+p0.x*0.5,y:tile.cy*0.5+p0.y*0.5},cp2:{x:tile.cx*0.5+p3.x*0.5,y:tile.cy*0.5+p3.y*0.5},p3};
}
function bezPt(t,p0,c1,c2,p3){
  const u=1-t;
  return {x:u*u*u*p0.x+3*u*u*t*c1.x+3*u*t*t*c2.x+t*t*t*p3.x,
          y:u*u*u*p0.y+3*u*u*t*c1.y+3*u*t*t*c2.y+t*t*t*p3.y};
}
function distToRoadCenter(px,py,tile){
  if(tile.isDeco)return Infinity;
  const bz=getWorldBezier(tile);
  let best=Infinity;
  for(let i=0;i<=40;i++){
    const pt=bezPt(i/40,bz.p0,bz.cp1,bz.cp2,bz.p3);
    const d=Math.hypot(px-pt.x,py-pt.y);
    if(d<best)best=d;
  }
  return best;
}
function inHex(px,py,cx,cy){
  for(let e=0;e<6;e++){
    const a=edgeAngle(e),mid=edgeMid(cx,cy,e);
    if((px-mid.x)*Math.cos(a)+(py-mid.y)*Math.sin(a)>5.0)return false;
  }
  return true;
}
function getPhysicsWheels(cx,cy,angle){
  const fD=CAR_FRONT_AXLE,rD=-CAR_REAR_AXLE;
  const fX=Math.cos(angle)*fD,fY=Math.sin(angle)*fD;
  const rX=Math.cos(angle)*rD,rY=Math.sin(angle)*rD;
  const dx=Math.cos(angle+Math.PI/2),dy=Math.sin(angle+Math.PI/2);
  return [
    {x:cx+fX+dx*CAR_FRONT_TRACK/2,y:cy+fY+dy*CAR_FRONT_TRACK/2},
    {x:cx+fX-dx*CAR_FRONT_TRACK/2,y:cy+fY-dy*CAR_FRONT_TRACK/2},
    {x:cx+rX+dx*CAR_REAR_TRACK/2,y:cy+rY+dy*CAR_REAR_TRACK/2},
    {x:cx+rX-dx*CAR_REAR_TRACK/2,y:cy+rY-dy*CAR_REAR_TRACK/2}
  ];
}

// ── RENDER CACHE ──────────────────────────────────────
const TSIZE=Math.ceil(R*2+10);
const tCache=new Map();

function renderTile(tile){
  try{
  const ck=`${tile.key}_${tile.entry}_${tile.exit}_${tile.isNarrow?'N':'W'}_${tile.isOverpass?'O':'G'}_${tile.biome}_${tile.theme||'grass'}`;
  if(tCache.has(ck))return tCache.get(ck);
  const oc=document.createElement('canvas');oc.width=oc.height=TSIZE;
  const c=oc.getContext('2d');const lc=TSIZE/2;
  function hexPath(pad){
    pad=pad||0;c.beginPath();
    for(let i=0;i<6;i++){const a=Math.PI/3*i,r2=R+pad;i===0?c.moveTo(lc+r2*Math.cos(a),lc+r2*Math.sin(a)):c.lineTo(lc+r2*Math.cos(a),lc+r2*Math.sin(a));}
    c.closePath();
  }
  const thm = tile.theme || 'grass';
  const biome = tile.biome || 'meadow';

  const themeBase = {
      grass:  { meadow:['#7db84a','#5e9630'], forest:['#4bc328','#3aa21b'], wheat:['#e6c300','#cca300'], dirt:['#8b5a2b','#6b421a'], stone:['#8c8c8c','#666666'] },
      desert: { meadow:['#d2b48c','#c3a070'], forest:['#c8a050','#b08840'], wheat:['#e8c870','#d0b050'], dirt:['#c39b60','#a88048'], stone:['#a08c78','#85705a'] },
      snow:   { meadow:['#eef5ff','#ccddee'], forest:['#dce8f5','#b8d0e8'], wheat:['#eef5ff','#ccddee'], dirt:['#b0c0d0','#90a0b0'], stone:['#99aabb','#778899'] },
      urban:  { meadow:['#3a3a4a','#2a2a3a'], forest:['#303040','#202030'], wheat:['#444455','#333344'], dirt:['#2a2a3a','#1a1a2a'], stone:['#4a4a5a','#3a3a4a'] }
  };

  let isTrack = !tile.isDeco;
  let baseCols = themeBase[thm][isTrack ? 'meadow' : biome] || themeBase.grass.meadow;

  if (tile.isDeco || !tile.isOverpass) {
      c.fillStyle=baseCols[0]; hexPath(3); c.fill();
      c.save(); hexPath(1); c.clip();

      let seed = tile.cx*13.37 + tile.cy*42.0;
      const rnd = ()=>{seed=(seed*9301+49297)%233280;return seed/233280;};

      // Low-poly faceted overlay
      for(let i=0; i<35; i++) {
          c.beginPath();
          c.moveTo(lc+(rnd()-0.5)*R*2.2, lc+(rnd()-0.5)*R*2.2);
          c.lineTo(lc+(rnd()-0.5)*R*2.2, lc+(rnd()-0.5)*R*2.2);
          c.lineTo(lc+(rnd()-0.5)*R*2.2, lc+(rnd()-0.5)*R*2.2);
          c.fillStyle = rnd()>0.5 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
          c.fill();
      }

      // Catan-style heavy 3D border
      hexPath(0);
      c.lineWidth=14; c.strokeStyle='rgba(0,0,0,0.15)'; c.stroke();
      c.lineWidth=6; c.strokeStyle='rgba(255,255,255,0.15)'; c.stroke();

      if(tile.isDeco) {
          if (biome === 'forest') {
              for(let i=0; i<25; i++){
                  let tx=lc+(rnd()-0.5)*R*1.4, ty=lc+(rnd()-0.5)*R*1.4, sz=30+rnd()*25;
                  let isSnow = thm === 'snow';
                  let baseCol = isSnow ? '#b0d0d0' : (thm==='desert'?'#8a9a40':'#2d6a2f');
                  let midCol  = isSnow ? '#d0e8e8' : (thm==='desert'?'#a0b050':'#3a8c3d');
                  let topCol  = isSnow ? '#ffffff' : (thm==='desert'?'#c0d060':'#4eb552');

                  function polyCirc(x,y,r,sides,color, rotOff) {
                      c.fillStyle=color; c.beginPath();
                      for(let s=0;s<sides;s++){
                          let a=rotOff+s*Math.PI*2/sides;
                          s===0?c.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));
                      }
                      c.fill(); c.strokeStyle='rgba(0,0,0,0.2)'; c.lineWidth=2; c.stroke();
                  }
                  let rot=rnd()*Math.PI;
                  polyCirc(tx, ty, sz, 6, baseCol, rot);
                  polyCirc(tx, ty, sz*0.7, 6, midCol, rot+0.2);
                  polyCirc(tx, ty, sz*0.4, 6, topCol, rot-0.1);
              }
          }
          else if (biome === 'stone') {
              if (thm === 'urban') {
                  for(let i=0; i<20; i++){
                      let tx=lc+(rnd()-0.5)*R*1.4, ty=lc+(rnd()-0.5)*R*1.4, w=50+rnd()*40, h=50+rnd()*40;
                      let offset = 15 + rnd()*20; // 3D depth offset for top-down view

                      c.fillStyle='rgba(0,0,0,0.4)'; // drop shadow
                      c.fillRect(tx-w/2+15, ty-h/2+15, w, h);

                      // Building mass (sides showing depth)
                      c.fillStyle='#334'; c.beginPath(); c.moveTo(tx-w/2,ty-h/2); c.lineTo(tx-w/2+offset,ty-h/2-offset); c.lineTo(tx+w/2+offset,ty-h/2-offset); c.lineTo(tx+w/2,ty-h/2); c.fill();
                      c.fillStyle='#445'; c.beginPath(); c.moveTo(tx+w/2,ty-h/2); c.lineTo(tx+w/2+offset,ty-h/2-offset); c.lineTo(tx+w/2+offset,ty+h/2-offset); c.lineTo(tx+w/2,ty+h/2); c.fill();

                      // Flat roof
                      c.fillStyle='#223'; c.fillRect(tx-w/2, ty-h/2, w, h);
                      c.strokeStyle='#556'; c.lineWidth=3; c.strokeRect(tx-w/2, ty-h/2, w, h);

                      // Roof AC unit / detail
                      c.fillStyle='#112'; c.fillRect(tx-w/4, ty-h/4, w/2, h/2);
                  }
              } else {
                  for(let i=0; i<12; i++){
                      let tx=lc+(rnd()-0.5)*R*1.3, ty=lc+(rnd()-0.5)*R*1.3, r=50+rnd()*60;
                      let p1={x:tx, y:ty-r}, p2={x:tx+r, y:ty}, p3={x:tx, y:ty+r}, p4={x:tx-r, y:ty};
                      let cTop = thm==='snow' ? '#ffffff' : '#bbbbbb';
                      let cR = thm==='desert' ? '#c8a070' : '#888888';
                      let cB = thm==='desert' ? '#a88560' : '#555555';
                      let cL = thm==='desert' ? '#e0c090' : '#aaaaaa';

                      // Top-down pyramid shapes
                      c.fillStyle=cTop; c.beginPath(); c.moveTo(tx,ty); c.lineTo(p1.x,p1.y); c.lineTo(p2.x,p2.y); c.fill(); c.strokeStyle='rgba(0,0,0,0.1)'; c.stroke();
                      c.fillStyle=cR; c.beginPath(); c.moveTo(tx,ty); c.lineTo(p2.x,p2.y); c.lineTo(p3.x,p3.y); c.fill(); c.stroke();
                      c.fillStyle=cB; c.beginPath(); c.moveTo(tx,ty); c.lineTo(p3.x,p3.y); c.lineTo(p4.x,p4.y); c.fill(); c.stroke();
                      c.fillStyle=cL; c.beginPath(); c.moveTo(tx,ty); c.lineTo(p4.x,p4.y); c.lineTo(p1.x,p1.y); c.fill(); c.stroke();
                  }
              }
          }
          else if (biome === 'wheat') {
              for(let i=0; i<18; i++){
                  let tx=lc+(rnd()-0.5)*R*1.3, ty=lc+(rnd()-0.5)*R*1.3, sz=60+rnd()*40;
                  c.fillStyle=rnd()>0.5?'#e6c300':'#d4b000';
                  // Top-down hex field
                  c.beginPath();
                  for(let s=0;s<6;s++){
                      let a=s*Math.PI/3;
                      s===0?c.moveTo(tx+sz*Math.cos(a),ty+sz*Math.sin(a)):c.lineTo(tx+sz*Math.cos(a),ty+sz*Math.sin(a));
                  }
                  c.fill(); c.strokeStyle='#c2a000'; c.lineWidth=6; c.stroke();
                  // Tractor lines
                  c.strokeStyle='rgba(0,0,0,0.15)'; c.lineWidth=3;
                  for(let o=-sz*0.8; o<sz*0.8; o+=14) {
                      c.beginPath(); c.moveTo(tx-sz*0.8, ty+o); c.lineTo(tx+sz*0.8, ty+o); c.stroke();
                  }
              }
          }
          else if (biome === 'dirt') {
              for(let i=0; i<20; i++){
                  let tx=lc+(rnd()-0.5)*R*1.4, ty=lc+(rnd()-0.5)*R*1.4, sz=30+rnd()*40;
                  // Top-down craters/rocks
                  c.fillStyle='rgba(0,0,0,0.15)';
                  c.beginPath();
                  for(let s=0;s<7;s++){
                      let a=s*Math.PI*2/7;
                      let r2=sz*(0.8+rnd()*0.4);
                      s===0?c.moveTo(tx+r2*Math.cos(a),ty+r2*Math.sin(a)):c.lineTo(tx+r2*Math.cos(a),ty+r2*Math.sin(a));
                  }
                  c.fill();

                  c.fillStyle='rgba(255,255,255,0.08)';
                  c.beginPath(); c.arc(tx-sz*0.2,ty-sz*0.2,sz*0.4,0,Math.PI*2); c.fill();
              }
          }
      }

      c.restore();
      if(tile.isDeco) { tCache.set(ck,oc); return oc; }
  }
  const bzL=getLocalBezier(tile);
  function drawBez(lw,style){
    c.beginPath();c.moveTo(bzL.p0.x,bzL.p0.y);
    c.bezierCurveTo(bzL.cp1.x,bzL.cp1.y,bzL.cp2.x,bzL.cp2.y,bzL.p3.x,bzL.p3.y);
    c.strokeStyle=style;c.lineWidth=lw;c.lineCap='butt';c.stroke();
  }
  c.save();hexPath(1);c.clip();
  const w=tile.isNarrow?ROAD_W*0.45:ROAD_W;

  if(tile.isOverpass){
    c.shadowColor='rgba(0,30,60,0.8)';c.shadowBlur=30;c.shadowOffsetY=15;c.shadowOffsetX=15;
    drawBez(w+40,'#2a2a2a');
    c.shadowColor='transparent';
    c.setLineDash([40, 15]);
    drawBez(w+28,'#4a4a4a');
    c.setLineDash([]);
    drawBez(w+12,'#6a6a6a');
  } else {
    // Dirt/stone base border
    drawBez(w+30,'rgba(0,0,0,0.3)'); 
    drawBez(w+16,'#2c2c2c');
  }

  // Base dark stone road
  drawBez(w,'#383838');

  // Big blocky stone segments using lines (very subtle color diff, long dashes)
  c.setLineDash([160, 6]);
  drawBez(w,'#3b3b3b');
  c.setLineDash([200, 8]);
  drawBez(w*0.85,'#353535');
  c.setLineDash([]);

  // Edges
  c.setLineDash([40, 40]);
  drawBez(w-8, 'rgba(0,0,0,0.2)');
  c.setLineDash([]);

  // Center line (worn)
  c.setLineDash([40, 40]);
  drawBez(12,'rgba(220,180,50,0.4)');
  c.setLineDash([]);

  c.restore();
  function drawLineAcross(t,color,lw){
    const pt=bezPt(t,bzL.p0,bzL.cp1,bzL.cp2,bzL.p3),pb=bezPt(t+0.01,bzL.p0,bzL.cp1,bzL.cp2,bzL.p3);
    const pa=Math.atan2(pb.y-pt.y,pb.x-pt.x)-Math.PI/2;
    c.beginPath();c.moveTo(pt.x+Math.cos(pa)*w*0.5,pt.y+Math.sin(pa)*w*0.5);c.lineTo(pt.x-Math.cos(pa)*w*0.5,pt.y-Math.sin(pa)*w*0.5);c.strokeStyle=color;c.lineWidth=lw;c.stroke();
  }
  if(tile.isStart)drawLineAcross(0.05,'#00ff00',12);
  if(tile.isFinish)drawLineAcross(0.95,'#ffff00',12);
  function kerb(e){
    const mid=edgeMid(lc,lc,e),a=edgeAngle(e),p=a-Math.PI/2,sw=(w*0.5*2)/10;
    for(let s=0;s<10;s++){
      c.save();c.translate(mid.x+Math.cos(p)*(-w*0.5+sw*s+sw*0.5),mid.y+Math.sin(p)*(-w*0.5+sw*s+sw*0.5));c.rotate(a);
      c.fillStyle=s%2===0?'#5a1010':'#9e9080';c.fillRect(-sw*0.48,-12,sw*0.96,24);c.restore();
    }
  }
  kerb(tile.entry);kerb(tile.exit);
  tCache.set(ck,oc);return oc;
  }catch(e){console.warn('renderTile err',e);return null;}
}

// ── PARTICLES ─────────────────────────────────────────
let particles=[];
function spawnDust(x,y,count,color){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,spd=30+Math.random()*80;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,maxLife:0.4+Math.random()*0.4,r:4+Math.random()*8,color});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=0.88;p.vy*=0.88;
    p.life-=dt/p.maxLife;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life)*0.7;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── GAME ENGINE ───────────────────────────────────────
let car={},cam={};
let state='menu',raceStart=0,raceTime=0,finished=false,isNewRecord=false;
let prevCarX=0,prevCarY=0;
// Steering reversal tracking
let lastSteerDir=0, steerReverseTimer=0;

function mkBtn(id){
  const el=document.getElementById(id),s={v:false};
  const p=e=>{if(e.cancelable)e.preventDefault();e.stopPropagation();s.v=true;el.classList.add('on');};
  const r=e=>{if(e.cancelable)e.preventDefault();e.stopPropagation();s.v=false;el.classList.remove('on');};
  el.addEventListener('touchstart',p,{passive:false});el.addEventListener('touchend',r,{passive:false});
  el.addEventListener('mousedown',p);el.addEventListener('mouseup',r);el.addEventListener('mouseleave',r);
  return s;
}
const btnL=mkBtn('bL'),btnR=mkBtn('bR');
const keys={};
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

function resetGame(){
  tCache.clear();buildTrack();totalCPs=trackTiles.length;
  const st=trackTiles[0],em=edgeMid(st.cx,st.cy,st.exit),em0=edgeMid(st.cx,st.cy,st.entry);
  car={x:st.cx,y:st.cy,angle:Math.atan2(em.y-em0.y,em.x-em0.x),
    speed:0,trail:[],skidMarks:[],falling:false,fallAlpha:1,
    tIdx:0,onHex:true,onRoad:true,steerVisual:0,cpsHit:0};
  prevCarX=car.x;prevCarY=car.y;
  cam={x:car.x,y:car.y,angle:car.angle,zoom:ZOOM_BASE};
  particles=[];lastSteerDir=0;steerReverseTimer=0;
  raceStart=0;raceTime=0;finished=false;isNewRecord=false;updHUD();
}

function checkHighUp(idx){
  const t=allTiles[idx];if(!t||t.isDeco)return false;if(t.isOverpass)return true;
  const ti=t.idx;
  if(typeof ti==='number'){
    if(trackTiles[ti+1]&&trackTiles[ti+1].isOverpass)return true;
    if(ti>0&&trackTiles[ti-1]&&trackTiles[ti-1].isOverpass)return true;
  }
  return false;
}

let lastTs=0;
function update(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  prevCarX=car.x;prevCarY=car.y;

  updateParticles(dt);

  if(car.falling){
    car.fallAlpha-=dt*1.2;  // slower fade
    car.speed*=0.97;         // gentler slowdown while falling
    car.x+=Math.cos(car.angle)*car.speed*dt;car.y+=Math.sin(car.angle)*car.speed*dt;
    // dust while falling
    if(Math.random()<0.3) spawnDust(car.x,car.y,1,'rgba(180,160,100,0.8)');
    if(car.fallAlpha<=0){resetGame();state='racing';doFlash('OFF TRACK!','#ff3366');}
    updHUD();return;
  }

  let goL=false,goR=false;
  if(!finished){
    goL=btnL.v||keys['arrowleft']||keys['a'];
    goR=btnR.v||keys['arrowright']||keys['d'];
  }

  const wasBraking=car.isBraking; const gas=goL||goR,brake=!finished&&!gas; car.isBraking=brake; if(brake && !wasBraking) car.skidId=(car.skidId||0)+1;

  // Steering reversal penalty
  const curSteer=goL?-1:goR?1:0;
  if(curSteer!==0&&lastSteerDir!==0&&curSteer!==lastSteerDir){
    // direction reversed — apply speed penalty
    car.speed=Math.max(0,car.speed-STEER_PENALTY*(car.speed/MAX_ROAD));
    steerReverseTimer=0.12; // brief visual wobble window
  }
  if(curSteer!==0)lastSteerDir=curSteer;
  if(steerReverseTimer>0)steerReverseTimer-=dt;

  if(finished){car.speed-=200*dt;car.steerVisual*=0.85;}
  else{
    if(gas)car.speed+=ACCEL*dt;
    if(car.isBraking){ car.speed -= BRAKE * dt * Math.max(0.1, Math.min(1, car.speed / 400)); }
    else if(!gas)car.speed-=COAST*dt;
  }

  // Grass drag — gentler
  if(!car.onRoad)car.speed*=(1-GRASS_DRAG*dt);
  car.speed=Math.max(0,Math.min(MAX_ROAD,car.speed));

  const sf=car.speed/MAX_ROAD;
  const sr=STEER*(0.35+1.2*(1-sf));
  if(!finished){
    if (brake && lastSteerDir !== 0 && car.speed > 50) {
      // Auto-drift when braking (scales purely by speed factor 'sf')
      const driftRate = STEER * sf * 0.6; // Drops to almost zero at low speeds
      car.angle += lastSteerDir * driftRate * dt;
      car.steerVisual = lastSteerDir * 0.5; // visibly turn wheels more
    } else {
      car.angle+=(goL?-1:goR?1:0)*sr*dt;
      // small wobble on reversal
      const wobble=steerReverseTimer>0?Math.sin(steerReverseTimer*80)*0.08:0;
      car.steerVisual=(goL?-1:goR?1:0)*Math.abs(sr/STEER)*0.5+wobble;
    }
  }

  car.x+=Math.cos(car.angle)*car.speed*dt;
  car.y+=Math.sin(car.angle)*car.speed*dt;

  let candidates=[];
  for(let i=0;i<allTiles.length;i++){if(inHex(car.x,car.y,allTiles[i].cx,allTiles[i].cy))candidates.push(i);}

  let newIdx=car.tIdx;
  if(candidates.length>0){
    car.onHex=true;
    let tCand=candidates.filter(c=>!allTiles[c].isDeco);
    if(tCand.length>0){
      const isHigh=checkHighUp(car.tIdx);
      tCand=tCand.filter(c=>c===car.tIdx||c===car.tIdx+1||c===car.tIdx-1||(isHigh?checkHighUp(c):!allTiles[c].isOverpass));
      if(!tCand.length)tCand=[car.tIdx];
      let minRD=Infinity;
      for(const c of tCand){
        let rd=distToRoadCenter(car.x,car.y,allTiles[c]);
        if(c===car.tIdx)rd-=100;if(c===(car.tIdx+1)%trackTiles.length)rd-=50;
        if(rd<minRD){minRD=rd;newIdx=c;}
      }
    } else newIdx=candidates[0];
  } else car.onHex=false;

  car.tIdx=newIdx;
  const cT=allTiles[car.tIdx];
  const pW=getPhysicsWheels(car.x,car.y,car.angle);
  let maxWDist=0,outHex=false;

  if(cT&&!car.falling){
    for(const w of pW){
      if(!cT.isDeco){const d=distToRoadCenter(w.x,w.y,cT);if(d>maxWDist)maxWDist=d;}
      let wIn=false;
      for(const c of candidates){if(inHex(w.x,w.y,allTiles[c].cx,allTiles[c].cy)){wIn=true;break;}}
      if(!wIn)for(const t of allTiles){if(inHex(w.x,w.y,t.cx,t.cy)){wIn=true;break;}}
      if(!wIn)outHex=true;
    }
    if(!cT.isDeco){
      const mAD=(cT.isNarrow?ROAD_W*0.45:ROAD_W)/2;
      car.onRoad=maxWDist<=mAD+5;

      // Grass dust from rear wheels
      if(!car.onRoad&&car.speed>80&&Math.random()<0.5){
        const _dx=Math.cos(car.angle+Math.PI/2),_dy=Math.sin(car.angle+Math.PI/2);
        const _rx=Math.cos(car.angle)*(-CAR_REAR_AXLE),_ry=Math.sin(car.angle)*(-CAR_REAR_AXLE);
        spawnDust(car.x+_rx+_dx*CAR_REAR_TRACK/2, car.y+_ry+_dy*CAR_REAR_TRACK/2, 1,'rgba(100,200,60,0.75)');
        spawnDust(car.x+_rx-_dx*CAR_REAR_TRACK/2, car.y+_ry-_dy*CAR_REAR_TRACK/2, 1,'rgba(120,210,50,0.75)');
      }

      if(cT.isOverpass&&maxWDist>mAD-8){
        car.x-=Math.cos(car.angle)*car.speed*dt*1.5;car.y-=Math.sin(car.angle)*car.speed*dt*1.5;car.speed*=0.5;
        if(!finished)doFlash('GUARDRAIL!','#ffaa00');car.onRoad=true;
      }
    } else car.onRoad=false;
    if(!finished&&(!car.onHex||outHex)){
      car.falling=true;car.fallAlpha=1;car.trail=[];car.skidMarks=[];doFlash('OFF TRACK!','#ff3366');
    }
  }

  if(car.onRoad&&!car.falling&&!finished&&cT&&!cT.isDeco&&!cT.visited){cT.visited=true;car.cpsHit++;}

  const isHighUp=checkHighUp(car.tIdx);

  // Skid marks
  if(car.onRoad&&!finished&&car.isBraking&&car.speed>10){
    const dx=Math.cos(car.angle+Math.PI/2),dy=Math.sin(car.angle+Math.PI/2);
    const rX=Math.cos(car.angle)*(-CAR_REAR_AXLE),rY=Math.sin(car.angle)*(-CAR_REAR_AXLE);
    car.skidMarks.push({p1:{x:car.x+rX+dx*CAR_REAR_TRACK/2,y:car.y+rY+dy*CAR_REAR_TRACK/2},wheel:'l',high:isHighUp,id:car.skidId});
    car.skidMarks.push({p1:{x:car.x+rX-dx*CAR_REAR_TRACK/2,y:car.y+rY-dy*CAR_REAR_TRACK/2},wheel:'r',high:isHighUp,id:car.skidId});
    if(car.skidMarks.length>500)car.skidMarks.splice(0,2);
  }
  if(!car.falling&&car.speed>15){car.trail.push({x:car.x,y:car.y,high:isHighUp});if(car.trail.length>200)car.trail.shift();}

  if(raceStart===0&&car.speed>15)raceStart=ts;
  if(raceStart>0&&!finished)raceTime=ts-raceStart;

  // Finish
  if(!car.falling&&!finished&&cT){
    const ft=trackTiles[trackTiles.length-1];
    const mid=edgeMid(ft.cx,ft.cy,ft.exit),outA=edgeAngle(ft.exit);
    const nx=Math.cos(outA),ny=Math.sin(outA),perp=-ny,pery=nx;
    const d0=(prevCarX-mid.x)*nx+(prevCarY-mid.y)*ny;
    const d1=(car.x-mid.x)*nx+(car.y-mid.y)*ny;
    const fw=ft.isNarrow?ROAD_W*0.45:ROAD_W;
    if(Math.abs((car.x-mid.x)*perp+(car.y-mid.y)*pery)<fw*0.45&&d0<0&&d1>=0){
      if(car.cpsHit>=totalCPs){
        finished=true;
        if(!savedRecords[currentLevelIdx]||raceTime<savedRecords[currentLevelIdx]){savedRecords[currentLevelIdx]=raceTime;saveRecords();isNewRecord=true;}
        doFlash(isNewRecord?'NEW RECORD!':'FINISH!','#00ffcc');
        setTimeout(()=>showFinish(raceTime<=GOLD_TIME),2500);
      } else {doFlash('MISSED A SECTOR!','#ff3366');car.speed*=0.8;}
    }
  }

  // Camera
  let dA=car.angle-cam.angle;
  while(dA>Math.PI)dA-=Math.PI*2;while(dA<-Math.PI)dA+=Math.PI*2;
  cam.angle+=dA*CAM_ANGLE_LERP;
  const ahead=car.speed*CAM_AHEAD;
  const targetX=car.x+Math.cos(car.angle)*ahead;
  const targetY=car.y+Math.sin(car.angle)*ahead;
  cam.x+=(targetX-cam.x)*CAM_POS_LERP;
  cam.y+=(targetY-cam.y)*CAM_POS_LERP;
  const targetZoom=car.falling?ZOOM_BASE*1.3:ZOOM_BASE-(car.speed/MAX_ROAD)*ZOOM_RANGE;
  cam.zoom+=(targetZoom-cam.zoom)*CAM_ZOOM_LERP;

  updHUD();
}

const THEME_SKY = {
  grass:  ['#1a8cff','#80d4ff'],
  desert: ['#e87c2a','#f5c97a'],
  snow:   ['#b0d4f0','#e8f4ff'],
  urban:  ['#1a1a2e','#2e3a5a']
};
function drawBackground(){
  const th = typeof LEVEL_THEMES !== 'undefined' && LEVEL_THEMES[currentLevelIdx] ? LEVEL_THEMES[currentLevelIdx] : 'grass';
  const sk = THEME_SKY[th] || THEME_SKY.grass;
  const bg=ctx.createLinearGradient(0,0,0,cv.height);
  bg.addColorStop(0,sk[0]);bg.addColorStop(1,sk[1]);
  ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);
}

function drawSkidMarks(isHigh){
  if(car.skidMarks.length<2)return;
  ctx.lineWidth=10;ctx.lineCap='round';ctx.lineJoin='round';
  for(const side of['l','r']){
    ctx.beginPath();ctx.strokeStyle='rgba(0,0,0,0.7)';
    let last=null;
    for(const m of car.skidMarks){
      if(m.wheel!==side) continue; 
      if(m.high!==isHigh){last=null;continue;}
      if(!last || last.id !== m.id) ctx.moveTo(m.p1.x,m.p1.y);
      else ctx.lineTo(m.p1.x,m.p1.y);
      last=m;
    }
    ctx.stroke();
  }
}

function drawTrail(isHigh){
  ctx.beginPath();let dr=false;
  for(let i=1;i<car.trail.length;i++){
    const a=car.trail[i-1],b=car.trail[i];
    if(a.high!==isHigh||b.high!==isHigh){dr=false;continue;}
    if(!dr){ctx.moveTo(a.x,a.y);dr=true;}ctx.lineTo(b.x,b.y);
  }
  ctx.strokeStyle='rgba(255,50,0,0.5)';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
}

function drawCarBody(){
  const L=CAR_L,W=CAR_W,flW=32,flL=L*0.6;
  ctx.save();ctx.translate(5,5);ctx.globalAlpha*=0.4;
  ctx.fillStyle='#000';ctx.beginPath();ctx.roundRect(-flW/2,-L*0.2,flW,flL,3);ctx.fill();
  if(car.isBraking) {
    ctx.fillStyle='rgba(255,50,50,0.9)';ctx.beginPath();
    ctx.arc(-W*0.6,-L*0.45,4,0,Math.PI*2);
    ctx.arc(W*0.6,-L*0.45,4,0,Math.PI*2);
    ctx.fill();
    ctx.shadowColor='red';ctx.shadowBlur=15;ctx.fill();ctx.shadowBlur=0;
  }
  ctx.moveTo(0,-L*0.8);ctx.lineTo(W,-L*0.5);ctx.lineTo(W,L*0.45);ctx.lineTo(-W,L*0.45);ctx.lineTo(-W,-L*0.5);ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.fillStyle='#1c1d21';ctx.beginPath();ctx.roundRect(-flW/2,-L*0.2,flW,flL,3);ctx.fill();
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=3;ctx.beginPath();
  ctx.moveTo(-W*0.25,-L*0.65);ctx.lineTo(-CAR_FRONT_TRACK/2,-CAR_FRONT_AXLE);
  ctx.moveTo(W*0.25,-L*0.65);ctx.lineTo(CAR_FRONT_TRACK/2,-CAR_FRONT_AXLE);
  ctx.moveTo(-W*0.5,L*0.35);ctx.lineTo(-CAR_REAR_TRACK/2,CAR_REAR_AXLE);
  ctx.moveTo(W*0.5,L*0.35);ctx.lineTo(CAR_REAR_TRACK/2,CAR_REAR_AXLE);ctx.stroke();
  ctx.fillStyle='#111';ctx.fillRect(-W*1.8,-L*0.85,W*3.6,L*0.12);
  ctx.fillStyle='#cc0022';ctx.fillRect(-W*1.7,-L*0.83,W*3.4,L*0.06);
  ctx.fillStyle='#111';ctx.fillRect(-W*1.6,L*0.45,W*3.2,L*0.15);
  ctx.fillStyle='#cc0022';ctx.fillRect(-W*1.5,L*0.48,W*3.0,L*0.08);
  ctx.fillStyle='#cc0022';ctx.beginPath();
  ctx.moveTo(0,-L*0.85);ctx.lineTo(W*0.3,-L*0.6);ctx.lineTo(W*0.5,-L*0.2);ctx.lineTo(W*1.1,0);
  ctx.lineTo(W*0.8,L*0.3);ctx.lineTo(W*0.3,L*0.48);ctx.lineTo(-W*0.3,L*0.48);ctx.lineTo(-W*0.8,L*0.3);
  ctx.lineTo(-W*1.1,0);ctx.lineTo(-W*0.5,-L*0.2);ctx.lineTo(-W*0.3,-L*0.6);ctx.closePath();ctx.fill();
  ctx.fillStyle='#880011';
  ctx.beginPath();ctx.moveTo(W*0.5,-L*0.1);ctx.lineTo(W,0);ctx.lineTo(W*0.7,L*0.25);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-W*0.5,-L*0.1);ctx.lineTo(-W,0);ctx.lineTo(-W*0.7,L*0.25);ctx.closePath();ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(W*0.7,-L*0.05,W*0.3,L*0.05,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-W*0.7,-L*0.05,W*0.3,L*0.05,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#050505';ctx.beginPath();ctx.ellipse(0,-L*0.05,W*0.4,L*0.18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffee00';ctx.beginPath();ctx.arc(0,-L*0.05,W*0.25,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aa0011';ctx.lineWidth=2.5;ctx.beginPath();ctx.ellipse(0,-L*0.05,W*0.45,L*0.22,0,-Math.PI/4,Math.PI+Math.PI/4);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold ${CAR_W*0.9}px Courier New`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.save();ctx.translate(0,L*0.25);ctx.fillText(String(currentLevelIdx+1),0,0);ctx.restore();
}

function drawLayer(overpass){
  const half=TSIZE/2;
  const cullR=(Math.max(cv.width,cv.height)/cam.zoom)*1.8;
  for(const t of allTiles){
    if(!!t.isOverpass!==overpass)continue;
    if(Math.hypot(t.cx-cam.x,t.cy-cam.y)>cullR)continue;
    const _rt=renderTile(t);if(!_rt)continue;ctx.save();ctx.translate(t.cx,t.cy);ctx.drawImage(_rt,-half,-half);
    if(t.visited&&!t.isDeco){
      ctx.beginPath();for(let i=0;i<6;i++)i===0?ctx.moveTo(R*Math.cos(Math.PI/3*i),R*Math.sin(Math.PI/3*i)):ctx.lineTo(R*Math.cos(Math.PI/3*i),R*Math.sin(Math.PI/3*i));
      ctx.closePath();ctx.strokeStyle='#ffcc00';ctx.lineWidth=14;ctx.stroke();
    }
    ctx.restore();
  }
}

function drawCar(){
  const wRot=car.angle+car.steerVisual;
  const dx=Math.cos(car.angle+Math.PI/2),dy=Math.sin(car.angle+Math.PI/2);
  const fx=Math.cos(car.angle)*CAR_FRONT_AXLE,fy=Math.sin(car.angle)*CAR_FRONT_AXLE;
  const rx=Math.cos(car.angle)*(-CAR_REAR_AXLE),ry=Math.sin(car.angle)*(-CAR_REAR_AXLE);
  const wh=[
    {x:car.x+fx+dx*CAR_FRONT_TRACK/2,y:car.y+fy+dy*CAR_FRONT_TRACK/2,rot:wRot,isF:true},
    {x:car.x+fx-dx*CAR_FRONT_TRACK/2,y:car.y+fy-dy*CAR_FRONT_TRACK/2,rot:wRot,isF:true},
    {x:car.x+rx+dx*CAR_REAR_TRACK/2,y:car.y+ry+dy*CAR_REAR_TRACK/2,rot:car.angle,isF:false},
    {x:car.x+rx-dx*CAR_REAR_TRACK/2,y:car.y+ry-dy*CAR_REAR_TRACK/2,rot:car.angle,isF:false}
  ];
  for(const w of wh){
    ctx.save();ctx.translate(w.x,w.y);ctx.rotate(w.rot+Math.PI/2);
    const wl=w.isF?16:18,ww=w.isF?9:11;
    ctx.fillStyle=(car.onRoad&&!car.falling)?'#181818':'#222';
    ctx.beginPath();ctx.roundRect(-ww/2,-wl/2,ww,wl,2);ctx.fill();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=car.falling?Math.max(0,car.fallAlpha):1;
  ctx.translate(car.x,car.y);ctx.rotate(car.angle+Math.PI/2);drawCarBody();ctx.restore();
}

function drawScene(){
  drawBackground();
  if(!car||car.x===undefined)return;
  ctx.save();
  ctx.translate(cv.width/2,cv.height*0.55);
  ctx.rotate(-cam.angle-Math.PI/2);
  ctx.scale(cam.zoom,cam.zoom);
  ctx.translate(-cam.x,-cam.y);

  const isHighUp=checkHighUp(car.tIdx);
  drawLayer(false);
  if(car.trail.length>1&&!car.falling&&!car.isBraking)drawTrail(false);drawSkidMarks(false);
  drawParticles();
  if(!isHighUp)drawCar();
  drawLayer(true);
  if(car.trail.length>1&&!car.falling&&!car.isBraking)drawTrail(true);drawSkidMarks(true);
  if(isHighUp)drawCar();
  ctx.restore();
}

function updHUD(){document.getElementById('hT').textContent=fmt(raceTime);}
let flT=null;
function doFlash(t,color){
  color=color||'#ffffff';
  if(color==='#00ffff'||color==='#00ffcc') color='#ffffff';
  const el=document.getElementById('fl');el.textContent=t;el.style.color=color;
  el.style.textShadow=`0 4px 10px rgba(0,0,0,0.8)`;el.style.opacity='1';
  clearTimeout(flT);flT=setTimeout(()=>el.style.opacity='0',2500);
}

function showFinish(isGold){
  state='finish';const ov=document.getElementById('finishMenu');
  let nextBtn='';
  if(currentLevelIdx+1<LEVEL_DATA.length&&savedRecords[currentLevelIdx]!==null&&savedRecords[currentLevelIdx]<=GOLD_TIME)
    nextBtn=`<button class="ob" onclick="loadLevel(${currentLevelIdx+1})">NEXT LEVEL</button>`;
  ov.innerHTML=`
    <h1 style="font-size:clamp(30px,8vw,60px);color:#fff;">${isNewRecord?'NEW RECORD!':'RACE FINISHED!'}</h1>
    <p style="margin-bottom:20px;">TIME<br><span style="font-size:46px;color:#fff;font-weight:900;text-shadow:0 2px 6px rgba(0,0,0,0.8)">${fmt(raceTime)}</span></p>
    ${isGold?`<p style="color:#ffcc00;font-size:18px;letter-spacing:2px;font-weight:bold;margin-bottom:30px;">🏆 GOLD TIME ACHIEVED! 🏆</p>`
            :`<p style="color:#ff3366;font-size:16px;letter-spacing:2px;font-weight:bold;margin-bottom:30px;">TARGET: ${fmt(GOLD_TIME)} FOR GOLD</p>`}
    <div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;">
      <button class="ob" onclick="initMenu()">MENU</button>
      <button class="ob" onclick="loadLevel(${currentLevelIdx})">RETRY</button>
      ${nextBtn}
    </div>`;
  ov.style.display='flex';
}

function loop(ts){
  if(state==='racing'){
    update(ts);drawScene();
  } else if(state==='menu'||state==='finish'){
    if(trackTiles&&trackTiles.length>0 && cam){
      cam.x+=0.5; cam.y-=0.3; // slowly pan
      drawBackground();
      ctx.save();
      ctx.translate(cv.width/2,cv.height/2);
      ctx.scale(cam.zoom,cam.zoom);
      ctx.translate(-cam.x,-cam.y);
      drawLayer(false);
      drawLayer(true);
      ctx.restore();
    } else {
      drawBackground();
    }
  }
  requestAnimationFrame(loop);
}

initMenu();requestAnimationFrame(loop);
</script>
</body>
